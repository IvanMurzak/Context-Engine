<!DOCTYPE html>
<!--
  editor-core's document (M9 e05c, design 04 §1).

  Served over `context-editor://app/index.html` by the Shell's resource handler — NEVER from a
  `file://` temp file (04 §1): a file origin would defeat the origin and CSP semantics this scheme
  exists to give the trusted editor-core zone, and would leave the bundle readable and writable on
  disk by anything running as the user.

  NO INLINE SCRIPT AND NO INLINE STYLE ANYWHERE IN THIS FILE. The response carries
  `script-src 'self'; style-src 'self'` with no `unsafe-inline` (see `app_csp_header()` in
  src/editor/shell/include/context/editor/shell/app_scheme.h), so an inline `<script>` or a
  `style="..."` attribute would be BLOCKED by the browser rather than merely frowned upon — which is
  the point: it is the backstop that keeps hostile authored project content, rendered through the
  hydration runtime, from executing in the trusted zone even if the escaping contract springs a leak
  (C-F6). The `webui-scheme-contract` gate re-asserts this mechanically on the BUILT asset, so the
  rule survives an edit that forgets it.

  The CSP is delivered as a RESPONSE HEADER, not a <meta> tag: a header cannot be stripped by
  anything that can rewrite this markup, and it applies to the document before a single byte of it
  is parsed.
-->
<html lang="en" data-editor-core="loading">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Context Editor</title>
    <link rel="stylesheet" href="./dockview.css">
    <link rel="stylesheet" href="./app.css">
</head>
<body>
    <!-- The docking root PanelHost mounts into (e05d). Empty on purpose: e05c ships the CHANNEL,
         not the app, and a placeholder that looked like UI would be a lie about what works. -->
    <main id="editor-root" role="main" aria-label="Context Editor"></main>
    <script type="module" src="./editor-core.js"></script>
</body>
</html>
