<!DOCTYPE html>
<!--
  editor-core's document (M9 e05c, design 04 §1).

  Served over `context-editor://app/index.html` by the Shell's resource handler — NEVER from a
  `file://` temp file (04 §1): a file origin would defeat the origin and CSP semantics this scheme
  exists to give the trusted editor-core zone, and would leave the bundle readable and writable on
  disk by anything running as the user.

  NO INLINE SCRIPT AND NO INLINE STYLE ANYWHERE IN THIS FILE. The response carries
  `script-src 'self'` with no `unsafe-inline` (see `app_csp_header()` in
  src/editor/shell/include/context/editor/shell/app_scheme.h), so an inline `<script>` or an inline
  event handler would be BLOCKED by the browser rather than merely frowned upon — which is the point:
  it is the backstop that keeps hostile authored project content, rendered through the hydration
  runtime, from executing in the trusted zone even if the escaping contract springs a leak (C-F6).
  The style side is widened only as far as the vendored engine needs: `style-src 'self' 'unsafe-inline'`
  admits inline CSS, because dockview-core injects a `<style>` element AND writes CSSOM inline styles to
  position panels at runtime, and the pinned CEF/Chromium build enforces `style-src` for BOTH (the
  narrower `style-src-attr` split does not hold on it). It stays strict where it counts —
  `script-src 'self'` carries no `unsafe-inline`, and connect-src 'none' + img-src + font-src leave
  inline CSS nowhere to exfiltrate to. This document is therefore STILL kept free of any inline
  `<style>` element or `style="..."` attribute as defense-in-depth, which the `webui-scheme-contract`
  gate re-asserts mechanically on the BUILT asset so the rule survives an edit that forgets it.

  The CSP is delivered as a RESPONSE HEADER, not a <meta> tag: a header cannot be stripped by
  anything that can rewrite this markup, and it applies to the document before a single byte of it
  is parsed.
-->
<html lang="en" data-editor-core="loading">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Context Editor</title>
    <link rel="stylesheet" href="./dockview.css">
    <link rel="stylesheet" href="./app.css">
</head>
<body>
    <!-- The docking root PanelHost mounts into (e05d1). Empty in the MARKUP on purpose: the panel
         set is read from the Shell's roster at runtime (`panel.list`), never authored here, which is
         what makes adding a panel a roster + provider change with no edit to this document. -->
    <main id="editor-root" role="main" aria-label="Context Editor"></main>

    <!-- The pinned docking engine (dockview-core@7.0.2), staged beside this document by
         tools/fetch_dockview.py after a SHA verification, and re-hashed in place by the
         `webui-assets` ctest.

         A CLASSIC (non-module) script, and BEFORE the module below, for three reasons:
           * it is a UMD bundle, so loading it this way publishes `globalThis["dockview-core"]` —
             the global `detectDockview()` reads (see core/src/dockview.ts);
           * a classic script runs to completion before the deferred module executes, so the engine
             is always present by the time PanelHost looks for it — no load-order race;
           * it is served SAME-ORIGIN from context-editor://app/, so `script-src 'self'` permits it
             with no CSP relaxation whatsoever. Nothing here is inline.

         Deliberately NOT bundled into editor-core.js: the shipped bytes must stay byte-identical to
         the artifact the SHA pin verified, and passing them through esbuild would make them a build
         product instead — quietly voiding the `webui-assets` re-hash. -->
    <script src="./dockview-core.min.js"></script>
    <script type="module" src="./editor-core.js"></script>
</body>
</html>
