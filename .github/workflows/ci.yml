# Context Engine CI — M0 bootstrap.
#
# GH-hosted runners ONLY for now: migrating the Windows leg to the org's self-hosted Windows
# runner is a deliberate later follow-up, not part of the M0 bootstrap.
#
# Toolchain (L-42): per-target pins live in cmake/toolchain-versions.json — the versioned,
# DECLARED target-vs-actual toolchain manifest. The pinned-toolchain composite action
# (.github/actions/pinned-toolchain, backed by tools/check_toolchain.py) applies it in every
# build job: ubuntu installs + strictly verifies the pinned clang from apt.llvm.org and exports
# CC/CXX; macOS advisory-verifies the recorded Apple clang (the manifest's honest temporary
# reality); Windows stays on documented MSVC — clang-cl adoption is a staged follow-up recorded
# in the manifest.
#
# Compiler caching: sccache on the ubuntu/macos legs via a LOCAL-disk cache dir — the churny
# GitHub-Actions cache backend stays OFF (SCCACHE_GHA_ENABLED=false; see the env: block). The
# setup-build-env composite action (.github/actions/setup-build-env) restores the dir via
# actions/cache and exports the shared CMake configure environment (Ninja on non-Windows); the
# sibling save-build-env composite writes the dir back on refs/heads/main only, so PR legs never
# create branch-scoped cache copies. The Windows/MSVC legs skip it deliberately: the Visual Studio
# generator ignores CMAKE_<LANG>_COMPILER_LAUNCHER, and sccache+MSVC is not worth fighting until
# the clang-cl follow-up lands.
#
# Fail-fast gating: the two ~10-second gates (license-gate, python-tests) front the heavyweight
# build/spike/bench jobs via `needs:` — a red gate stops ~12 heavy legs before they start, at
# the cost of a short serialization on green runs.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Compile caching (P1, 2026-07-18): the churny GHA backend stays OFF — it was spawning ~44 cache
  # entries per run (611 MB / 7,460 entries observed — the repo's dominant Actions-storage cost;
  # disabled 2026-07-05). Instead sccache uses a LOCAL-disk cache dir (SCCACHE_DIR) that the
  # setup-build-env / save-build-env composites persist across runs via actions/cache (RESTORE on
  # every ref, SAVE only on refs/heads/main). That restores cross-run compiler-object caching on
  # the 4 critical-path ubuntu/macOS jobs (build ×2, sanitize ×2) WITHOUT the per-branch cache
  # multiplication the GHA backend caused. Windows legs still skip sccache (a persistent on-disk
  # cache there is a separate follow-up).
  SCCACHE_GHA_ENABLED: "false"
  # Local-disk sccache backend (active because no cloud backend is configured above): sccache writes
  # compiled objects under SCCACHE_DIR; actions/cache persists that dir keyed per preset/os/image/week.
  # SCCACHE_DIR itself is NOT set here: it is ${RUNNER_TEMP}/sccache, but the runner context is
  # unavailable in a workflow-level env: block, so `${{ runner.temp }}` here would resolve to "" — a
  # bare "/sccache" that diverges from the step-level actions/cache path and silently defeats the
  # cache. The setup-build-env composite exports SCCACHE_DIR per-job in a shell step (where
  # $RUNNER_TEMP is populated). SCCACHE_CACHE_SIZE is a literal, so it stays here — it caps the dir so
  # a namespace can never silently grow the cached tarball (a cache-budget guardrail — keeps the repo
  # well under the 10 GB Actions-cache limit).
  SCCACHE_CACHE_SIZE: "800M"
  # Self-hosted-runner safety (2026-07-08): the three Windows CI jobs run as LocalSystem services
  # on ONE machine and share `C:\WINDOWS\system32\config\systemprofile\.gitconfig`. A per-job
  # `git config --global --add safe.directory '*'` step raced on `.gitconfig.lock` when >1 runner
  # ran concurrently ("could not lock config file ...: File exists"). Inject `safe.directory=*`
  # through git's environment instead — this writes NO file, so concurrent runners never collide.
  # Applies to every git invocation in every step (GH-hosted legs unaffected; the value is inert).
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"

jobs:
  license-gate:
    name: dependency-license gate (deny-by-default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run license gate
        run: python3 tools/check_licenses.py

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  # Fast pytest gate over the repo's Python tooling (R-QA-013 retroactive coverage):
  # tools/tests (license gate + toolchain-manifest gate) + bench/tests (seeded corpus
  # generator).
  python-tests:
    name: python tests (license gate + toolchain gate + corpus generator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run Python test suites
        run: python3 -m pytest tools/tests bench/tests -v

      # R-QA-012: CI CONSUMES the fleet manifest — validate it against the live workflows every run
      # (self-consistency + the advisory-until-provisioned rule + ci_job_id sync across BOTH the
      # per-PR rollup and the nightly benchmark workflow). See docs/ci-fleet-manifest.md.
      - name: Validate CI fleet manifest (R-QA-012)
        run: >
          python3 tools/check_fleet_manifest.py --manifest docs/ci-fleet-manifest.json
          --ci-workflow .github/workflows/ci.yml
          --ci-workflow .github/workflows/bench-nightly.yml

  build:
    name: build (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env
        with:
          preset: dev   # sccache namespace this job SAVES on main (sccache-dev-<os>)

      # Build files live in src/ (root stays minimal): configure with -S src; build/test
      # presets resolve CMakePresets.json from the working directory, so those run in src/.
      - name: Configure
        run: cmake -S src --preset dev

      - name: Build
        run: cmake --build --preset dev
        working-directory: src

      # Every registered suite EXCEPT the M1 + M2 + M4 + M5 + M6 + M7 + M8 + M8.5 exit gates, the M3
      # determinism gate, and the samples-corpus gate — those families run in their own named steps
      # below so each milestone/QA gate is legible per OS leg (same tests, each runs exactly once).
      - name: Run test suites (ctest)
        run: ctest --preset dev --verbose -E "^m1-exit-|^m2-exit-|^m4-exit-|^m5-exit-|^m6-exit-|^m7-exit-|^m8-exit-|^m85-exit-|^determinism-|^samples-corpus"
        working-directory: src

      # The M1 EXIT GATE (ROADMAP §1 M1 Exit / issue #36) — the five exit criteria as a BLOCKING
      # per-PR check on every OS leg (§6 tiering): files-as-truth equivalence (L-19), second-CLI
      # live attach (R-CLI-010), real kill-9 crash recovery (R-FILE-004), CLI ≡ RPC ≡ MCP ≡
      # introspection parity + additive-only error catalog (R-CLI-008/009), and dispatcher scope
      # enforcement (R-SEC-007). Registered in docs/ci-fleet-manifest.json as the m1-exit-* gates.
      - name: M1 exit gate (5 criteria, blocking)
        run: ctest --preset dev --output-on-failure -R "^m1-exit-"
        working-directory: src

      # The M2 EXIT GATE (ROADMAP §1 M2 Exit / issue #68) — the milestone-closing mirror of the M1
      # gate: five exit scenarios + the data-model seam checklist as a BLOCKING per-PR check on every
      # OS leg. Author-from-CLI + stable refs (L-19/34/37), schema migration round-trip (L-37), flatten
      # to GUID-addressable independently-loadable content units (R-ASSET-005), composed write +
      # provenance (R-CLI-006), per-payload migration vs the R-QA-011 fixtures, and the executable
      # data-model seam audit. Registered in docs/ci-fleet-manifest.json as the m2-exit-* gates.
      - name: M2 exit gate (5 criteria + seam audit, blocking)
        run: ctest --preset dev --output-on-failure -R "^m2-exit-"
        working-directory: src

      # The M3 DETERMINISM GATE (R-QA-005 / L-54, issue #74) — a BLOCKING per-PR check whose matrix
      # NAMES its platforms: this build job runs on ubuntu-latest (Linux-x64), windows-latest
      # (Win-x64), and macos-latest (macOS-ARM64, Apple Silicon), so the `determinism-*` ctest family
      # — a fixed seed + fixed input stream stepped to a fixed tick count, asserted against a
      # cross-platform GOLDEN hierarchical state-hash — runs on all three, and ANY per-platform
      # divergence turns that leg red. Registered in docs/ci-fleet-manifest.json as determinism-state-hash.
      - name: Determinism gate (R-QA-005 / L-54, blocking — Linux-x64 / Win-x64 / macOS-ARM64)
        run: ctest --preset dev --output-on-failure -R "^determinism-"
        working-directory: src

      # The SAMPLES CORPUS gate (R-QA-006 agent few-shot corpus; R-BUILD-009 / R-QA-008, issue #106)
      # — a BLOCKING per-PR check on every OS leg: the maintained sample projects under samples/ build
      # + headless-smoke-run through the REAL `context` binary (rots-if-broken), and the corpus is
      # asserted to exercise the breadth of the R-CLI-009 registry surface (the stable one-shot CLI
      # verbs ≡ RPC methods ≡ MCP tools, plus every registered file kind). Originally the M3-exit
      # contract-freeze READINESS artifact; the freeze has since landed (PR #113 — protocolMajor is 1,
      # the surface is FROZEN, the R-CLI-010 deprecation lifecycle is active; see
      # docs/deprecation-policy.md) and the corpus continues as the post-freeze breadth-of-surface
      # gate. Registered in docs/ci-fleet-manifest.json as the samples-corpus gate.
      - name: Samples corpus gate (R-QA-006 / R-BUILD-009 / R-QA-008, blocking)
        run: ctest --preset dev --output-on-failure -R "^samples-corpus"
        working-directory: src

      # The M4 EXIT GATE, headless criterion (ROADMAP §1 M4 Exit / issue #141) — a BLOCKING per-PR
      # check on every OS leg: with the render toggle OFF (this job compiles NO GPU backend),
      # headless still runs with the render module ABSENT (R-HEAD-002 — probe creates no device,
      # no-adapter attach yields no renderer, the engine steps renderer-less) and offscreen render
      # stays the OPT-IN detachable path (R-HEAD-004). The M4 exit's other two criteria are gated
      # on the real backends: the golden-scene SSIM corpus (render + render-web jobs vs goldens/)
      # and the min-spec floor bench (render job, bench/minspec_floor.py). Registered in
      # docs/ci-fleet-manifest.json as m4-exit-headless-no-render.
      - name: M4 exit gate (headless-no-render, R-HEAD-002/004, blocking)
        run: ctest --preset dev --output-on-failure -R "^m4-exit-"
        working-directory: src

      # The M5 EXIT GATE (ROADMAP §1 M5 Exit / issue #168) — the observer-editor milestone-closing mirror
      # of the M1/M2/M4 gates: a BLOCKING per-PR check on every OS leg. The headless end-to-end
      # walkthrough (open a project -> inspect via scene-tree F2 / inspector F3 / Problems F4 -> play F5
      # -> override-edit F3 -> undo F7 -> the F1 viewport observes the SAME render snapshot, R-HUX-011
      # human-loops measured), the a11y + keyboard-only-nav + coverage-manifest gate (every panel a11y-
      # clean; the a11y registry ⟷ coverage.manifest.jsonl), and the M5 observer-editor seam checklist —
      # all drive the LANDED headless editor-GUI panels with NO CEF / NO GPU / NO daemon, so they run on
      # this default build matrix "headlessly across the OS matrix". The per-OS CEF boot smoke
      # (editor-cef-smoke job), the native-vs-web golden-scene SSIM equivalence (render / render-web
      # jobs), and the axe-class DOM a11y re-scan (editor-cef-smoke job, tools/a11y_scan.py) are the
      # SIBLING CI-job gates the M5 exit references. Registered in docs/ci-fleet-manifest.json as the
      # m5-exit-* gates.
      - name: M5 exit gate (observer-editor walkthrough + a11y/coverage + seam checklist, blocking)
        run: ctest --preset dev --output-on-failure -R "^m5-exit-"
        working-directory: src

      # The M6 EXIT GATE (design §M6-EXIT / issue #197) — the core-systems milestone-closing mirror
      # of the M1/M2/M4/M5 gates: five blocking per-PR ctests on every OS leg, RIDING the landed M6
      # machinery. Both EXIT-A sample games headless-step through the shipped RuntimeKernel session
      # surface with every gameplay package visibly active (R-QA-005); a sustained run of the
      # authored samples/platformer-2d/scripts/movement.ts in the REAL V8 host keeps every JS-tier
      # GC pause inside the R-SIM-008 inter-tick budget via the X1 profiler channel (R-LANG-012);
      # the X3 combined-gameplay determinism wedge (cross-platform golden state-hash + triage) is
      # re-asserted as the exit alias; the X2 netsync harness replicates the roll-3d moving-body
      # scene between two sessions on the composed-id identity + dirty/delta metadata and converges
      # (L-48 / R-NET-001); and the executable M6 seam checklist audits one assertion per seam.
      # All headless: no GPU, no audio device (miniaudio null backend). This job builds EVERY
      # target via `--preset dev`, so each gate's executable is always built (never "Not Run"); the
      # strict-FP `deterministic` job's hand-maintained --target list is deliberately unchanged
      # (the exit alias registers no new determinism-* ctest name). Registered in
      # docs/ci-fleet-manifest.json as the m6-exit-* gates. Green here CLOSES M6.
      - name: M6 exit gate (games-run + gc-budget + determinism wedge + netcode + seam checklist, blocking)
        run: ctest --preset dev --output-on-failure -R "^m6-exit-"
        working-directory: src

      # The M7 EXIT GATE (design 2026-07-13-m7-runtime-ui / a12-m7-exit) — the runtime-UI milestone-
      # closing mirror of the M1/M2/M4/M5/M6 gates: five blocking per-PR ctests on every OS leg,
      # RIDING the landed M7 machinery over REAL authored content (samples/platformer-2d/ui/hud.ui-hud.json
      # + samples/roll-3d/ui/panel.ui-worldpanel.json). The authored platformer HUD data-binds through
      # the REAL a5 `context ui` load path AND renders headless via the a6 read-only extract
      # (m7-exit-1); the REAL `context` binary drives it cross-process via the ui.* verbs, failing
      # closed on a wrong assertion (m7-exit-2); the roll-3d world-space panel's logic chain turns a
      # screen ray into a gameplay intent in the ONE sim sink — raycast -> UV -> panel coords -> the a3
      # single sink, a9 flat AND a10 curved (m7-exit-3); hash_world is bit-identical with the UI absent /
      # null-provider / GPU-provider, pinning D6 (m7-exit-4); and the executable M7 seam checklist audits
      # one assertion per seam, including owner rulings (c) shaped-text-capability-truth and (d)
      # curved-panel-interaction-presence (m7-exit-5). All headless: no GPU, no renderer, no daemon.
      # This job builds EVERY target via `--preset dev`, so each gate's executable is always built
      # (never "Not Run") — NO `--target` list changes are needed (the M6 precedent); the strict-FP
      # `deterministic` job's hand-maintained --target list is deliberately UNCHANGED (m7-exit-4
      # registers no new determinism-* ctest name — the m6-exit-3 alias precedent). Registered in
      # docs/ci-fleet-manifest.json as the m7-exit-* gates. Green here CLOSES M7.
      - name: M7 exit gate (hud-headless + cli-drive + worldpanel + determinism-presentation + seam checklist, blocking)
        run: ctest --preset dev --output-on-failure -R "^m7-exit-"
        working-directory: src

      # The M8 EXIT GATE (ROADMAP §1-M8 exit / a14-m8-exit) — the build-pipeline milestone-closing mirror
      # of the M1/M2/M4/M5/M6/M7 gates: the blocking per-PR m8-exit-* ctests on every OS leg, RIDING the
      # landed M8 build-pipeline machinery. The full v1 platform-set (linux desktop+server, windows, macos,
      # web) builds HEADLESS per-agent through the a05 orchestrator + a06/a10/a11/a13 export adapters, each
      # a supported runnable-artifact plan (m8-exit-1); the a10 Authenticode + a13 Developer-ID/notarization
      # signing hooks are never-silent on an unsigned artifact and verify-before-use fails closed under the
      # a08 pinned Ed25519 production trust root, R-SEC-009 (m8-exit-2); the R-BUILD-009 headless smoke boots
      # BOTH shipped wedge binaries over a real pack + steps N ticks (m8-exit-3, the a07 alias); the packed
      # wedge build passes the L-54 state-hash gate against the SHIPPED RuntimeKernel (m8-exit-4a, the a07
      # alias) AND carries the validated L-48/R-NET-001 replication metadata (m8-exit-4b, the a07 alias);
      # and the executable M8 seam checklist audits one assertion per seam, incl. the OPS1-honest
      # advisory-until-provisioned build-time budget, R-BUILD-006/R-QA-012 (m8-exit-5). This job builds
      # EVERY target via `--preset dev`, so each gate's executable is always built (never "Not Run") — NO
      # `--target` list changes are needed (the M6/M7 precedent); the -3/-4a/-4b aliases re-use the a07
      # executables (the m6-exit-3 alias precedent), registering NO new determinism-* ctest name, so the
      # strict-FP `deterministic` job's hand-maintained --target list is deliberately UNCHANGED. Registered
      # in docs/ci-fleet-manifest.json as the m8-exit-* gates. Green here CLOSES M8.
      - name: M8 exit gate (platform-set + desktop-signing + headless-smoke + determinism/replication wedge + seam checklist, blocking)
        run: ctest --preset dev --output-on-failure -R "^m8-exit-"
        working-directory: src

      # The M8.5 EXIT GATE (ROADMAP §1-M8.5 exit / a23-m85-exit) — the wedge-hardening (= v1) milestone-
      # closing mirror of the M1..M8 gates: the blocking per-PR m85-exit-* ctests on every OS leg, RIDING
      # the landed a15-a21 machinery. One gate per M8.5 exit clause: an operator-scoped agent + a human
      # co-edit and MERGE across worktrees with NO lost updates (m85-exit-1a/-1b, aliases of the a16 L-50
      # concurrency validation); a sandboxed package cannot exceed its granted capabilities + a TAMPERED
      # signed artifact is refused fail-closed under the a08 trust chain (m85-exit-2a/-2b, aliases of the
      # a17 security-redteam suite); profiling data is JSON-queryable on a live session via the REAL
      # `context profile session` verb + a Chrome-trace export, L-47 (m85-exit-3); the trailing-GUI
      # surface is exercised — tilemap paint (a18), in-context viewport override edit (a19 R-HUX-006 core),
      # contextual help (a20 R-HUX-010) (m85-exit-4a/-4b/-4c, aliases of the landed GUI parity/help
      # tests); and the R-FILE-011 orchestration-density targets are committed + honestly advisory per the
      # ops1 state, the numbers benchmarked by the sibling density-bench job (m85-exit-5). This job builds
      # EVERY target via `--preset dev`, so each gate's executable is always built (never "Not Run") — NO
      # `--target` list changes are needed (the M6/M7/M8 precedent); the aliases register NO new
      # determinism-* ctest name, so the strict-FP `deterministic` job's hand-maintained --target list is
      # deliberately UNCHANGED. Registered in docs/ci-fleet-manifest.json as the m85-exit-* gates. Green
      # here CLOSES M8.5 (= the v1 wedge).
      - name: M8.5 exit gate (co-edit/merge + sandbox/tamper + profiling-json + trailing-GUI + density, blocking)
        run: ctest --preset dev --output-on-failure -R "^m85-exit-"
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      # Persist the warmed sccache-dev-<os> object cache (main only; PR legs never write) — the ONE
      # saver for the dev namespace that ~8 ubuntu/macOS dev-preset jobs restore.
      - name: Save build environment (sccache dir, main only)
        uses: ./.github/actions/save-build-env

      # Shared Docker Desktop daemon janitor (best-effort, self-hosted Windows only).
      # ~21 self-hosted runners on this box share ONE Docker Desktop daemon. Context-Engine
      # CI itself uses no Docker, so this only reclaims week-cold BUILD CACHE left behind by
      # OTHER repos' jobs on the shared daemon. The unused-for=168h age filter guarantees no
      # sibling runner's current or in-flight build cache is ever eligible (an active build's
      # layers carry a recent last-used timestamp), so this can never disrupt a concurrent
      # job. Deliberately NOT run: image / volume / container / system prune (a container
      # prune would delete this machine's intentionally-stopped local-dev compose containers).
      # continue-on-error keeps a green run green if docker is unreachable from the service.
      - name: Reclaim week-stale shared Docker build cache (best-effort)
        if: always() && runner.os == 'Windows' && runner.environment == 'self-hosted'
        continue-on-error: true
        shell: pwsh
        run: docker builder prune -f --filter "unused-for=168h"

  # M6-F0a — the OPT-IN DETERMINISTIC BUILD FLAVOR (R-SIM-005 / L-54, issue #170). Proves the
  # `deterministic` preset CONFIGURES + BUILDS on the THREE compilers with the correct per-compiler
  # strict-FP spellings (clang / Apple clang: -ffp-contract=off; MSVC: /fp:strict) and that the build
  # PRODUCES a verified `deterministic:true` attestation (never a self-declared bit) — the DoD the
  # design says to nail in F0a, not P1. The strict-FP flag block is engine-wide, so building only the
  # determinism targets still exercises the flags on each compiler without rebuilding the whole tree
  # under the flavor. Runs the `determinism-*` family under strict-FP: the produced-attestation test
  # (deterministic:true here vs an honest false on the default `build` job) plus the state-hash + the
  # fixed-point physics-wedge gates (which stay byte-identical — they are integer-only). Same 3-OS
  # matrix + self-hosted-Windows/MSVC setup as `build`. Gated behind the cheap gates like the others.
  deterministic:
    name: deterministic (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (deterministic preset)
        run: cmake -S src --preset deterministic

      - name: Build determinism targets under strict-FP
        run: cmake --build --preset deterministic --target context_determinism_test_attestation context_session_determinism_gate context_session_determinism_physics context_physics3d_determinism_scene context_physics2d_determinism_scene context_particles_determinism_scene context_animation_determinism_scene context_spline_determinism_scene context_input_determinism_scene context_session_determinism_gameplay context_runtime_server context_runtime_host_test_packed_determinism
        working-directory: src

      - name: Deterministic attestation + determinism gates (produces deterministic:true, blocking)
        run: ctest --preset deterministic --output-on-failure -R "^determinism-"
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # L-38 locks sanitizer- and TSan-gated CI from day one, but TSan cannot combine with
  # ASan/UBSan in one binary — hence one matrixed job building each preset separately (the
  # per-entry `name:` preserves the two historical check names). M0 has no threaded engine
  # code yet (spikes are exempt from the sanitizer gate), so today this builds+runs
  # context-hello under each sanitizer to keep the presets proven and the jobs wired; the
  # TSan leg grows real coverage with M1's threaded kernel code (the L-38 auto-parallel
  # scheduler).
  sanitize:
    name: ${{ matrix.name }}
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: sanitize
            name: sanitize (ASan+UBSan, ubuntu)
          - preset: tsan
            name: sanitize (TSan, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env
        with:
          preset: ${{ matrix.preset }}   # per-leg sccache namespace (sccache-sanitize-Linux / sccache-tsan-Linux)

      - name: Configure (${{ matrix.preset }} preset)
        run: cmake -S src --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
        working-directory: src

      - name: Run context-hello under the sanitizer
        run: ctest --preset ${{ matrix.preset }} --verbose
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      # Persist the warmed sanitizer object cache (main only; PR legs never write). Each matrix leg
      # saves its own namespace — ASan+UBSan → sccache-sanitize-Linux, TSan → sccache-tsan-Linux.
      - name: Save build environment (sccache dir, main only)
        uses: ./.github/actions/save-build-env

  # R-FILE-011 benchmark baseline on a SMALL corpus (10k files). GH-hosted runners are
  # NOT the R-QA-009 perf-isolated runner class — this job is a trend gauge + harness
  # smoke (results archived as artifacts), not a gating floor. The full 100k corpus run
  # stays local/perf-box. Spike targets are opt-in (the `spikes` preset), so the default
  # build matrix above stays vcpkg-free.
  bench-baseline:
    name: bench baseline (10k corpus, ubuntu)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # vcpkg binary caching: persist the built spike-dep archives across runs via
      # actions/cache (vcpkg's own GHA backend, x-gha, was removed upstream — the 'files'
      # provider pointed at a cached workspace dir is the supported replacement). The key
      # is shared with the spike-webgpu integration leg, which installs the same manifest.
      #
      # The runner IMAGE version folds into the primary key: vcpkg's package ABI hash also
      # depends on the runner-default compiler, which rolls with each GH image update. Keying
      # only on the manifest hash means an image roll keeps the SAME key -> actions/cache hits
      # the stale archive (a primary-key hit is NEVER re-saved) yet vcpkg sees the ABI mismatch
      # and rebuilds every dep from source, forever (`Restored 0 package(s)`; issue #264 review).
      # Adding the image dimension forces a fresh key + a re-save when the image rolls.
      # ImageVersion is a runner-injected env var (absent from the ${{ env }} expression context),
      # so resolve it in a shell step; it is unset on self-hosted runners -> a stable `selfhosted`
      # token keeps the key deterministic there. No branch/sha/run_id in any key (owner: no
      # per-branch cache growth) — the bare-os restore-key lets a PR restore main's entries.
      - name: Resolve runner image tag (vcpkg ABI cache dimension)
        shell: bash
        run: echo "VCPKG_CACHE_IMAGE_TAG=${ImageVersion:-selfhosted}" >> "$GITHUB_ENV"

      # RESTORE on every ref (PRs warm-restore main's archive via the restore-key prefix); the
      # guarded SAVE below writes ONLY on main, so a PR never creates a branch-scoped ~500 MB copy
      # (the cache-budget reclaim — P3). A PR that edits the vcpkg manifest cache-misses and rebuilds
      # from source that once; on merge, main re-saves.
      - name: vcpkg binary cache (restore)
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-bin-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-
            vcpkg-bin-${{ runner.os }}-

      - name: Generate seeded 10k corpus
        run: python3 bench/gen_corpus.py --size 10000 --out bench/corpora/corpus-10k --jobs 4

      # The `spikes` preset owns the flag group (vcpkg toolchain via $VCPKG_ROOT,
      # VCPKG_MANIFEST_FEATURES=spikes, CONTEXT_BUILD_SPIKES=ON, Release); its binaryDir is
      # src/build/spikes, and src/CMakeLists.txt pins spike binary dirs to
      # ${CMAKE_BINARY_DIR}/spikes/<x> — hence the subject path below.
      #
      # CEF spike stays OUT of CI by design: CONTEXT_BUILD_SPIKE_CEF is deliberately NOT set
      # here (CEF's pinned binary distribution is a ~162 MB download / ~460 MB extracted —
      # would wreck job time and runner cache for zero signal, since the spike's render/input
      # proof needs a GPU + interactive desktop anyway). With CONTEXT_BUILD_SPIKES=ON this
      # configure still ENTERS spikes/cef-compositing/CMakeLists.txt, which early-returns —
      # that configure-only exercise is the CI-side proof the spike's CMake stays valid.
      # Measured results live in spikes/cef-compositing/FINDINGS.md (local Windows runs).
      - name: Configure (spikes preset, vcpkg toolchain)
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          cmake -S src --preset spikes

      - name: Build parse-bench
        run: cmake --build --preset spikes --target context-parse-bench
        working-directory: src

      - name: Canonical fixpoint check (serialize∘parse == identity on canonical input)
        run: >
          ./src/build/spikes/spikes/parse-bench/context-parse-bench canon-check
          --corpus bench/corpora/corpus-10k --sample 500

      - name: Run harness (median-of-5, R-QA-009 discipline)
        run: >
          python3 bench/harness.py
          --subject ./src/build/spikes/spikes/parse-bench/context-parse-bench
          --corpus bench/corpora/corpus-10k
          --runs 5 --single-thread-attach --count 2000
          --out bench/results/ci-ubuntu-10k --label ci-ubuntu-10k

      # R-QA-009 perf gate wired to the 10k benchmark. ADVISORY (continue-on-error): a shared
      # GitHub runner is NOT the perf-isolated `perf-linux-bare-metal` runner class the manifest
      # names, so its numbers cannot gate (docs/perf-gate-methodology.md rule 1 + the R-QA-012
      # advisory-until-provisioned contract). It records the measurement to the time-series archive
      # and, once a baseline exists, reports drift — it never red-Xs the rollup here.
      - name: Perf gate (R-QA-009, advisory until the perf box is provisioned)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/ci-ubuntu-10k.json
          --scenario attach
          --baseline bench/baselines/attach-ci-ubuntu-10k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench/results/
          if-no-files-found: error

      # SAVE the vcpkg archive ONLY on main (P3): the dir is now populated by the spikes configure
      # above. Same primary key as the restore; PR legs skip this, so no per-branch duplicate.
      - name: vcpkg binary cache (save, main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}

  # R-FILE-011 per-PR proxy on the REAL attach pipeline (issue #38; §6 tiering: the 10k-file
  # variant is the blocking per-PR stand-in for the 100k gate until M3). The JOB is BLOCKING — the
  # real filesync-reconcile-index + derivation-graph + daemon-boot loop must run green end to end
  # on the 10k corpus, and the R-FILE-011 per-stage budget-table extraction must succeed — while
  # the perf NUMBERS stay advisory (a shared GitHub runner is NOT the R-QA-009 perf-isolated
  # `perf-linux-bare-metal` class; the manifest's advisory-until-provisioned contract applies).
  # The FULL 100k benchmark + the query/sustained/daemons/dense scenarios run NIGHTLY in
  # .github/workflows/bench-nightly.yml (advisory/trend). Distinct from bench-baseline below,
  # which keeps the M0 parse-bench FILE-FORMAT baseline + canonical-fixpoint smoke.
  bench-attach-10k:
    name: bench attach proxy (10k, real pipeline, ubuntu)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the context CLI
        run: cmake --build --preset dev --target context
        working-directory: src

      - name: Generate seeded 10k corpus
        run: python3 bench/gen_corpus.py --size 10000 --out bench/corpora/corpus-10k --jobs 4

      # attach (fresh, parse+canonicalize+hash-bounded w/ progress) -> attach_warm (index-warm,
      # mtime/size-gated) -> edit (R-FILE-011(b), both write paths) -> bulk (R-FILE-011(c)).
      # Ordering is load-bearing: the fresh attach persists the reconcile index warm attach needs.
      - name: Run harness on the real subject (median-of-5, R-QA-009 discipline)
        run: >
          python3 bench/harness.py
          --subject "./src/build/dev/cli/context bench"
          --corpus bench/corpora/corpus-10k
          --runs 5 --scenarios attach,attach_warm,edit,bulk
          --out bench/results/ci-real-10k --label ci-real-10k

      - name: Extract the per-stage latency budget table (R-FILE-011 M1 exit criterion)
        run: >
          python3 bench/budget_table.py
          --result bench/results/ci-real-10k.json
          --out bench/results/budget-table-10k

      # Advisory numbers gate (same contract as the bench-baseline job's): archives the
      # measurement + reports drift once a baseline exists; never red-Xs the rollup here.
      - name: Perf gate (R-QA-009, advisory until the perf box is provisioned)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/ci-real-10k.json
          --scenario attach
          --baseline bench/baselines/attach-real-ci-ubuntu-10k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-attach-results
          path: bench/results/
          if-no-files-found: error

  # R-BUILD-006 committed build-time budgets, per-PR benchmark (M8 a12). Measures the WARM
  # remote-cache-assisted build path (the default, per R-BUILD-006: hermetic CI seeds a trusted warm
  # cache so cold-CI is not the default) under the R-QA-009 methodology — median-of-5, dispersion
  # recorded, a +/-10% band, results archived as a time series. The from-source C++ compile (amortized
  # by the L-28 / sccache cache) is budgeted separately from the RECURRING per-build cache-exempt costs:
  # the a03 per-platform transcode and the a05 LTO/DCE final link (the lto-link phase rm's the runtime
  # binary before each timed run to isolate the real relink). The JOB is BLOCKING (the harness must run
  # green end to end + archive a time series); the numeric budget GATE is ADVISORY (continue-on-error) —
  # a shared GH runner is NOT the perf-isolated `perf-linux-bare-metal` runner class the fleet manifest
  # names, so it cannot gate (docs/perf-gate-methodology.md rule 1 + R-QA-012 advisory-until-provisioned;
  # the blocking flip is a FUTURE step gated on ops1). The fully COLD worst case is the nightly perf-box
  # floor (docs/build-time-budget-table.md; docs/ci-fleet-manifest.json build-time-budget gate).
  build-time-bench:
    name: build-time bench (warm cache, ubuntu)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      # Warm the tree: this is the from-source compile (sccache-assisted = the warm cache path).
      - name: Build the CLI + shipped server runtime host (warm from-source compile)
        run: cmake --build --preset dev --target context context_runtime_server
        working-directory: src

      # median-of-5 over the a05/a06 build pipeline. warm-rebuild = the cache-hot from-source compile;
      # lto-link rm's the binary before each run to isolate the a05 LTO/DCE relink; transcode times the
      # a03 per-platform transcode via a real `context build --target linux` over a minimal project.
      - name: Run the build-time benchmark (median-of-5, R-QA-009 discipline, WARM default)
        shell: bash
        run: |
          set -euo pipefail
          PROJ="$(mktemp -d)"
          mkdir -p "$PROJ/scenes"
          printf '%s' '{"$schema":"ctx:project","scene":"scenes/main.scene.json","version":1}' > "$PROJ/project.json"
          printf '%s' '{"$schema":"ctx:scene","version":1,"entities":[{"id":"aaaa0000aaaa0001","name":"Camera","components":{"camera":{"fov":1.0}}},{"id":"aaaa0000aaaa0002","name":"Player","components":{"transform":{}}}]}' > "$PROJ/scenes/main.scene.json"
          SERVER="$PWD/src/build/dev/runtime/host/context-runtime-server"
          python3 bench/build_time.py measure --cache-mode warm --runs 5 \
            --label ci-warm-ubuntu --runner-class gh-ubuntu-shared \
            --phase "from-source-compile::warm-rebuild::cmake --build src/build/dev --target context_runtime_server" \
            --phase "lto-link::runtime-server-link::cmake --build src/build/dev --target context_runtime_server" \
            --reset "lto-link::rm -f $SERVER" \
            --phase "transcode::linux-server::src/build/dev/cli/context build --target linux --flavor server --project $PROJ --out $PROJ/server.pack --runtime $SERVER" \
            --out bench/results/build-time-ci-warm

      # Advisory numbers gate (same contract as the bench-baseline / bench-attach perf gates): archives
      # the measurement to the time series + emits the budget table; never red-Xs the rollup here.
      - name: Build-time budget gate (R-BUILD-006, advisory until the perf box is provisioned)
        continue-on-error: true
        run: >
          python3 bench/build_time.py gate
          --result bench/results/build-time-ci-warm.json
          --budget bench/build-time-budget.json
          --archive bench/results/archive
          --out bench/results/build-time-table

      - name: sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload build-time results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-time-results
          path: bench/results/
          if-no-files-found: error

  # spikes/wasm smoke on ALL THREE platforms (L-8/R-LANG-003: per-platform WASM backends are
  # the point — wasmtime prebuilt C API + WAMR from source both support win/mac/linux).
  # Uses the stand-alone CONTEXT_BUILD_SPIKE_WASM toggle: no vcpkg toolchain, so the
  # vcpkg-dependent spikes stay unconfigured and the job stays lean. Honest per-platform
  # gating: the WAMR-AOT leg needs a wamrc prebuilt, which exists for x86_64 win/linux but NOT
  # for macos-arm64 — the spike's CMake gates it off there automatically (recorded in
  # spikes/wasm/FINDINGS.md).
  spike-wasm:
    name: spike-wasm (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (wasm spike only)
        run: >
          cmake -B build/spike-wasm -S src
          -DCMAKE_BUILD_TYPE=Release
          -DCONTEXT_BUILD_SPIKE_WASM=ON

      - name: Build
        run: cmake --build build/spike-wasm --config Release --target context-spike-wasm

      # ALL smoke legs are BLOCKING again (wasmtime + WAMR interpreter + WAMR AOT where wamrc
      # exists, plus the AOT target-pin regression guard). The WAMR AOT leg was quarantined
      # 2026-07-03→04 (tracker Context-Engine#24, intermittent SIGILL); ROOT CAUSE: wamrc's
      # default host-CPU codegen (LLVMGetHostCPUName() + empty explicit features ⇒ LLVM
      # model-default ISA) can overshoot what a hypervisor-masked VM in the CPU-heterogeneous
      # runner fleet actually executes, and WAMR's AOT loader never validates the ISA feature
      # level — the image loads and SIGILLs mid-run. FIXED by pinning the AOT codegen target to
      # the x86-64-v2 baseline in spikes/wasm/CMakeLists.txt; the
      # context-spike-wasm-aot-pin-guard ctest byte-verifies the pin so a drift fails
      # deterministically instead of flaking. On macos-arm64 the AOT tests are unregistered
      # (no wamrc prebuilt); the interpreter legs still run there.
      - name: Run smoke tests (wasmtime + wamr interp + wamr-aot — all blocking)
        run: ctest --test-dir build/spike-wasm -C Release -R context-spike-wasm --output-on-failure

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # The sandboxed WASM migration-runner tier (src/runtime/wasm/, issue #71 PR3; L-37 / L-62 /
  # R-SEC-009): the deterministic WasmRunner on the SHA-pinned wasmtime C-API prebuilt. A CI-only
  # dependency path like cef-substrate / V8: CONTEXT_BUILD_WASM stays OFF on the default `build`
  # matrix and the local dev gate (the MSVC-ABI wasmtime.dll.lib cannot link under the local
  # Strawberry-GCC toolchain, where the runner builds its honest STUB instead) — THIS job is the
  # AUTHORITATIVE 3-OS gate for the tier: it flips the toggle ON, requires the REAL backend
  # (CONTEXT_WASM_REQUIRE_RUNTIME=ON fails the configure if a leg would silently downgrade to the
  # stub and pass vacuously), builds the runner test executables, and runs the `wasm-runner-*`
  # ctests (deterministic VM config, budget->fuel = kWasmFuelPerBudgetNode x max_nodes, trap ->
  # catalog-code mapping, end-to-end document migration through real WAT guests). Windows rides
  # the self-hosted MSVC runner, like build/spike-wasm. NOTE (the deterministic-job caveat): this
  # job builds an EXPLICIT --target list — registering a NEW wasm-runner-* ctest means adding its
  # executable to the build step below too, or the new test reports "Not Run" -> RED here.
  wasm-runner:
    name: wasm-runner (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset + WASM runner tier, real backend required)
        run: cmake -S src --preset dev -DCONTEXT_BUILD_WASM=ON -DCONTEXT_WASM_REQUIRE_RUNTIME=ON

      - name: Build the WasmRunner tests
        run: cmake --build --preset dev --target context_wasm_test_wasm_runner context_wasm_test_wasm_fuel context_wasm_test_wasm_migrate_document context_wasm_test_wasm_fail_closed context_wasm_test_wasm_determinism
        working-directory: src

      - name: wasm-runner ctests (deterministic config + budget->fuel + trap mapping + e2e)
        run: ctest --preset dev -R "^wasm-runner-" --output-on-failure
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # M8 a06 export adapters (src/runtime/host/ + src/editor/build/adapter.*, R-BUILD-001/005/009 /
  # R-HEAD-001/002 / L-5, issue #259): build BOTH Linux flavors — desktop (render subsystem present) and
  # server/headless (render absent) — then prove each ASSEMBLED tarball artifact boots and steps N fixed
  # ticks on a CLEAN host with NO dev tree present (extracted to a temp dir outside the repo). Also folds
  # the R-BUILD-009 `context build --smoke` envelope + the L-5 render-footprint audit (the server binary
  # carries no render payload and is smaller). ubuntu-only: these are the Linux adapters; the desktop
  # flavor links only the GPU-free render abstraction (CONTEXT_BUILD_RENDER_WGPU stays OFF), so no GPU is
  # needed. The `runtime-host-*` ctests (in-process core/render + cross-process smoke + footprint) also
  # run on all three OS legs of the `build` job — this job adds the clean-host tarball boot.
  linux-export:
    name: linux-export (both flavors, clean-host boot)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the CLI + both shipped runtime-host flavors
        run: cmake --build --preset dev --target context context_runtime_desktop context_runtime_server context_runtime_host_test_core context_runtime_host_test_render context_runtime_host_test_smoke
        working-directory: src

      - name: Assemble each flavor's tarball and boot it on a CLEAN host (no dev tree)
        shell: bash
        run: |
          set -euo pipefail
          CTX="src/build/dev/cli/context"
          DESKTOP="$PWD/src/build/dev/runtime/host/context-runtime"
          SERVER="$PWD/src/build/dev/runtime/host/context-runtime-server"
          # A minimal buildable project (L-33 hex ids on every entity). printf, not heredoc — robust in YAML.
          proj="$(mktemp -d)"
          mkdir -p "$proj/scenes"
          printf '%s' '{"$schema":"ctx:project","scene":"scenes/main.scene.json","version":1}' > "$proj/project.json"
          printf '%s' '{"$schema":"ctx:scene","version":1,"entities":[{"id":"aaaa0000aaaa0001","name":"Camera","components":{"camera":{"fov":1.0}}},{"id":"aaaa0000aaaa0002","name":"Player","components":{"transform":{}}}]}' > "$proj/scenes/main.scene.json"
          for flavor in server desktop; do
            if [ "$flavor" = desktop ]; then bin="$DESKTOP"; else bin="$SERVER"; fi
            tar="$proj/dist/game-linux-$flavor.tar"
            echo "== build + emit-artifact + smoke ($flavor) =="
            # R-BUILD-009: `context build --smoke` launches the produced artifact + folds the boot signal.
            "$CTX" build --target linux --flavor "$flavor" --project "$proj" \
              --out "$proj/build/$flavor.pack" --runtime "$bin" --emit-artifact "$tar" \
              --smoke --smoke-ticks 16 | tee "$proj/$flavor-envelope.json"
            python3 -c "import json,sys; d=json.load(open(sys.argv[1]))['data']; assert d['adapter']['supported'] and d['adapter']['flavor']==sys.argv[2]; assert d['artifactEmit']['emitted']; assert d['smoke']['ran'] and d['smoke']['ok'] and d['smoke']['simTick']==16, d['smoke']" "$proj/$flavor-envelope.json" "$flavor"
            echo "== clean-host boot from the extracted tarball ($flavor) =="
            clean="$(mktemp -d)"          # a fresh dir OUTSIDE the repo / build tree — no dev tree present
            tar -xf "$tar" -C "$clean"
            chmod +x "$clean/bin/"* "$clean/launch.sh"   # tar_write emits 0644; the launcher/binary need +x
            signal="$("$clean/launch.sh" --ticks 16)"
            echo "clean-host $flavor signal: $signal"
            echo "$signal" | grep -q '"ok":true'
            echo "$signal" | grep -q '"simTick":16'
            echo "$signal" | grep -q "\"flavor\":\"$flavor\""
          done
          echo "== render-footprint audit (L-5 DCE: headless carries no render payload) =="
          python3 -c "import sys,pathlib; d=pathlib.Path(sys.argv[1]).read_bytes(); s=pathlib.Path(sys.argv[2]).read_bytes(); assert b'CTXHOST-FOOTPRINT:render-present' in d, 'render marker missing from desktop'; assert b'CTXHOST-FOOTPRINT:render-present' not in s, 'render marker in server (headless leaked render)'; assert len(s) < len(d), f'server {len(s)} not smaller than desktop {len(d)}'; print(f'render-footprint OK: desktop={len(d)} server={len(s)} delta={len(d)-len(s)}')" "$DESKTOP" "$SERVER"

      - name: runtime-host ctests (in-process core/render + cross-process smoke + footprint)
        run: ctest --preset dev -R "^runtime-host-" --output-on-failure
        working-directory: src

      - name: sccache stats
        run: ${SCCACHE_PATH} --show-stats

  # M8 a10 Windows export adapter + Authenticode signing hook (src/editor/build/adapter.* + signing.*,
  # R-BUILD-001/005 / R-SEC-003, task a10): the Windows sibling of linux-export. Builds BOTH Windows
  # flavors — desktop (render present) and server/headless (render absent) — then proves each ASSEMBLED
  # tarball artifact boots + steps N fixed ticks on a CLEAN host with no dev tree (extracted to a temp
  # dir outside the repo), via the launch.cmd batch launcher. Folds the R-BUILD-009 `context build
  # --smoke` envelope AND the a10 `--sign` signing report: this per-PR path has NO signing secrets, so
  # the report is the EXPLICIT, never-silent `state: unsigned` + build.artifact_unsigned WARNING (DoD 2)
  # — the actual Azure Trusted Signing runs custody-gated in the protected `release` environment (see
  # release-sign.yml, the a08/a10 pattern). Also the L-5 render-footprint audit (the server binary carries
  # no render payload + is smaller). Rides the self-hosted MSVC runner for same-repo PRs; a fork PR (no
  # secrets) falls back to GH-hosted windows-latest and stays GREEN, unsigned. No GPU — the desktop flavor
  # links only the GPU-free render abstraction (CONTEXT_BUILD_RENDER_WGPU stays OFF).
  windows-export:
    name: windows-export (both flavors, clean-host boot + signing report)
    needs: [license-gate, python-tests]
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the CLI + both shipped runtime-host flavors
        run: cmake --build --preset dev --target context context_runtime_desktop context_runtime_server context_runtime_host_test_core context_runtime_host_test_render context_runtime_host_test_smoke
        working-directory: src

      - name: Assemble each flavor's tarball, check the signing report, and boot it CLEAN-host (launch.cmd)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ctx = "src/build/dev/cli/context.exe"
          $desktop = "$PWD/src/build/dev/runtime/host/context-runtime.exe"
          $server  = "$PWD/src/build/dev/runtime/host/context-runtime-server.exe"
          # A minimal buildable project (L-33 hex ids on every entity).
          $proj = Join-Path $env:RUNNER_TEMP "ctx-winexport-proj"
          if (Test-Path $proj) { Remove-Item -Recurse -Force $proj }
          New-Item -ItemType Directory -Force -Path (Join-Path $proj "scenes") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $proj "dist") | Out-Null
          Set-Content -NoNewline -Encoding ascii -Path (Join-Path $proj "project.json") -Value '{"$schema":"ctx:project","scene":"scenes/main.scene.json","version":1}'
          Set-Content -NoNewline -Encoding ascii -Path (Join-Path $proj "scenes/main.scene.json") -Value '{"$schema":"ctx:scene","version":1,"entities":[{"id":"aaaa0000aaaa0001","name":"Camera","components":{"camera":{"fov":1.0}}},{"id":"aaaa0000aaaa0002","name":"Player","components":{"transform":{}}}]}'
          foreach ($flavor in @("server","desktop")) {
            if ($flavor -eq "desktop") { $bin = $desktop } else { $bin = $server }
            $tar = Join-Path $proj "dist/game-windows-$flavor.tar"
            Write-Host "== build + emit-artifact + sign + smoke ($flavor) =="
            # R-BUILD-009: --smoke launches the produced artifact + folds the boot signal. a10: --sign folds
            # the Authenticode signing report; no signing identity is present on this per-PR path.
            & $ctx build --target windows --flavor $flavor --project $proj `
              --out (Join-Path $proj "build/$flavor.pack") --runtime $bin --emit-artifact $tar `
              --sign --smoke --smoke-ticks 16 | Tee-Object -FilePath (Join-Path $proj "$flavor-envelope.json") | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "context build failed for $flavor (exit $LASTEXITCODE)" }
            $env0 = Get-Content (Join-Path $proj "$flavor-envelope.json") -Raw | ConvertFrom-Json
            $d = $env0.data
            if (-not $d.adapter.supported) { throw "adapter not supported for $flavor" }
            if ($d.adapter.flavor -ne $flavor) { throw "adapter flavor mismatch for $flavor" }
            if (-not $d.adapter.requiresSigning) { throw "windows adapter must set requiresSigning" }
            if (-not $d.artifactEmit.emitted) { throw "artifact not emitted for $flavor" }
            if (-not ($d.smoke.ran -and $d.smoke.ok -and $d.smoke.simTick -eq 16)) { throw "smoke failed for ${flavor}: $($d.smoke | ConvertTo-Json -Compress)" }
            # a10 signing NEVER silent: no signing identity on this PR path -> explicit unsigned WARNING.
            if (-not $d.signing.required) { throw "windows signing must be required for $flavor" }
            if ($d.signing.state -ne "unsigned") { throw "expected unsigned signing state on the unsigned PR path for $flavor, got $($d.signing.state)" }
            if ($d.signing.code -ne "build.artifact_unsigned") { throw "expected build.artifact_unsigned code for $flavor" }
            if (-not $env0.warnings -or @($env0.warnings).Count -lt 1) { throw "the unsigned artifact must surface a top-level warning for $flavor" }
            Write-Host "== clean-host boot from the extracted tarball ($flavor) =="
            $clean = Join-Path $env:RUNNER_TEMP "ctx-winexport-clean-$flavor"
            if (Test-Path $clean) { Remove-Item -Recurse -Force $clean }
            New-Item -ItemType Directory -Force -Path $clean | Out-Null
            tar -xf $tar -C $clean   # Windows 10+ ships bsdtar; extracts the ustar tarball
            $signal = & (Join-Path $clean "launch.cmd") --ticks 16 | Out-String
            Write-Host "clean-host $flavor signal: $signal"
            if ($signal -notmatch '"ok":true') { throw "clean-host boot for $flavor did not report ok" }
            if ($signal -notmatch '"simTick":16') { throw "clean-host boot for $flavor did not step 16 ticks" }
            if ($signal -notmatch "`"flavor`":`"$flavor`"") { throw "clean-host boot for $flavor reported wrong flavor" }
          }
          Write-Host "== render-footprint audit (L-5 DCE: headless carries no render payload) =="
          $latin1 = [System.Text.Encoding]::GetEncoding("ISO-8859-1")
          $dText = $latin1.GetString([System.IO.File]::ReadAllBytes($desktop))
          $sText = $latin1.GetString([System.IO.File]::ReadAllBytes($server))
          if ($dText.IndexOf("CTXHOST-FOOTPRINT:render-present") -lt 0) { throw "render marker missing from desktop" }
          if ($sText.IndexOf("CTXHOST-FOOTPRINT:render-present") -ge 0) { throw "render marker in server (headless leaked render)" }
          if ($sText.Length -ge $dText.Length) { throw "server ($($sText.Length)) not smaller than desktop ($($dText.Length))" }
          Write-Host "render-footprint OK: desktop=$($dText.Length) server=$($sText.Length) delta=$($dText.Length - $sText.Length)"

      - name: runtime-host ctests (in-process core/render + cross-process smoke + footprint)
        run: ctest --preset dev -R "^runtime-host-" --output-on-failure
        working-directory: src

  # M8 a13 macOS export adapter + Developer-ID signing/notarization hook (src/editor/build/adapter.* +
  # signing.*, R-BUILD-001/005/007 / R-SEC-003, task a13): the macOS sibling of linux-export/windows-export.
  # Builds BOTH macOS flavors — desktop (render present) and server/headless (render absent) — then proves
  # each ASSEMBLED tarball artifact boots + steps N fixed ticks on a CLEAN host with no dev tree (extracted
  # to a temp dir outside the repo), via the POSIX launch.sh (macOS is POSIX, like Linux — NOT a launch.cmd).
  # Folds the R-BUILD-009 `context build --smoke` envelope AND the a13 `--sign` signing report: this per-PR
  # path has NO signing secrets, so the report is the EXPLICIT, never-silent `state: unsigned` +
  # build.artifact_unsigned WARNING with method `developer-id-notarization` + notarizationRequired (DoD 2)
  # — the actual Developer-ID codesign + notarytool notarization runs custody-gated in the protected
  # `release` environment (release-sign.yml sign-macos job, custody model B). Plus the L-5 render-footprint
  # audit (the server binary carries no render payload + is smaller). GH-hosted macos-latest (Apple Silicon
  # = macOS-ARM64); no GPU — the desktop flavor links only the GPU-free render abstraction
  # (CONTEXT_BUILD_RENDER_WGPU stays OFF). Blocking, per PR.
  macos-export:
    name: macos-export (both flavors, clean-host boot + signing report)
    needs: [license-gate, python-tests]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the CLI + both shipped runtime-host flavors
        run: cmake --build --preset dev --target context context_runtime_desktop context_runtime_server context_runtime_host_test_core context_runtime_host_test_render context_runtime_host_test_smoke
        working-directory: src

      - name: Assemble each flavor's tarball, check the signing report, and boot it CLEAN-host (launch.sh)
        shell: bash
        run: |
          set -euo pipefail
          CTX="src/build/dev/cli/context"
          DESKTOP="$PWD/src/build/dev/runtime/host/context-runtime"
          SERVER="$PWD/src/build/dev/runtime/host/context-runtime-server"
          # A minimal buildable project (L-33 hex ids on every entity). printf, not heredoc — robust in YAML.
          proj="$(mktemp -d)"
          mkdir -p "$proj/scenes"
          printf '%s' '{"$schema":"ctx:project","scene":"scenes/main.scene.json","version":1}' > "$proj/project.json"
          printf '%s' '{"$schema":"ctx:scene","version":1,"entities":[{"id":"aaaa0000aaaa0001","name":"Camera","components":{"camera":{"fov":1.0}}},{"id":"aaaa0000aaaa0002","name":"Player","components":{"transform":{}}}]}' > "$proj/scenes/main.scene.json"
          for flavor in server desktop; do
            if [ "$flavor" = desktop ]; then bin="$DESKTOP"; else bin="$SERVER"; fi
            tar="$proj/dist/game-macos-$flavor.tar"
            echo "== build + emit-artifact + sign + smoke ($flavor) =="
            # R-BUILD-009: `context build --smoke` launches the produced artifact + folds the boot signal.
            # a13: --sign folds the Developer-ID signing report; no signing identity is present on this per-PR path.
            "$CTX" build --target macos --flavor "$flavor" --project "$proj" \
              --out "$proj/build/$flavor.pack" --runtime "$bin" --emit-artifact "$tar" \
              --sign --smoke --smoke-ticks 16 | tee "$proj/$flavor-envelope.json"
            # Assert the adapter/artifact/smoke result AND the a13 never-silent unsigned signing report.
            python3 -c "import json,sys; e=json.load(open(sys.argv[1])); d=e['data']; f=sys.argv[2]; a=d['adapter']; assert a['supported'] and a['flavor']==f, a; assert a['requiresSigning'], 'macOS adapter must set requiresSigning'; assert d['artifactEmit']['emitted']; sm=d['smoke']; assert sm['ran'] and sm['ok'] and sm['simTick']==16, sm; sg=d['signing']; assert sg['required'] and sg['state']=='unsigned' and sg['code']=='build.artifact_unsigned', sg; assert sg['method']=='developer-id-notarization' and sg.get('notarizationRequired') is True, sg; assert e.get('warnings'), 'the unsigned artifact must surface a top-level warning'; print('signing/adapter/smoke OK for '+f)" "$proj/$flavor-envelope.json" "$flavor"
            echo "== clean-host boot from the extracted tarball ($flavor) =="
            clean="$(mktemp -d)"          # a fresh dir OUTSIDE the repo / build tree — no dev tree present
            tar -xf "$tar" -C "$clean"
            chmod +x "$clean/bin/"* "$clean/launch.sh"   # tar_write emits 0644; the launcher/binary need +x
            signal="$("$clean/launch.sh" --ticks 16)"
            echo "clean-host $flavor signal: $signal"
            echo "$signal" | grep -q '"ok":true'
            echo "$signal" | grep -q '"simTick":16'
            echo "$signal" | grep -q "\"flavor\":\"$flavor\""
          done
          echo "== render-footprint audit (L-5 DCE: headless carries no render payload) =="
          python3 -c "import sys,pathlib; d=pathlib.Path(sys.argv[1]).read_bytes(); s=pathlib.Path(sys.argv[2]).read_bytes(); assert b'CTXHOST-FOOTPRINT:render-present' in d, 'render marker missing from desktop'; assert b'CTXHOST-FOOTPRINT:render-present' not in s, 'render marker in server (headless leaked render)'; assert len(s) < len(d), f'server {len(s)} not smaller than desktop {len(d)}'; print(f'render-footprint OK: desktop={len(d)} server={len(s)} delta={len(d)-len(s)}')" "$DESKTOP" "$SERVER"

      - name: runtime-host ctests (in-process core/render + cross-process smoke + footprint)
        run: ctest --preset dev -R "^runtime-host-" --output-on-failure
        working-directory: src

  # WebGPU spike (spikes/webgpu): native build on all three desktop platforms + the offscreen
  # render/readback self-check. The spike is standalone-configurable (no vcpkg — it pins its own
  # wgpu-native prebuilt), so this job stays light: no other spike's deps are configured here.
  # The readback test RUNS wherever a software adapter exists (lavapipe on ubuntu, WARP on
  # windows, the paravirtual Metal device on macos) and SKIPs cleanly (exit 77) where none does.
  spike-webgpu:
    name: spike webgpu (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # lavapipe (Mesa's software Vulkan rasterizer) gives the ubuntu leg a real adapter, so the
      # readback self-check actually renders on CI instead of skipping.
      - name: Install software Vulkan adapter (lavapipe)
        if: runner.os == 'Linux'
        # Retry/backoff around apt (Context-Engine#129) so a transient mirror blip is not a hard fail.
        run: bash tools/ci-retry.sh -- bash -c 'sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers'

      - name: Configure (standalone spike)
        run: cmake -S spikes/webgpu -B build/spike-webgpu -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/spike-webgpu --config Release

      - name: Run probe + offscreen render/readback self-check
        run: ctest --test-dir build/spike-webgpu -C Release --verbose

      # vcpkg binary cache for the integrated configure below (ubuntu only) — same shared
      # key as the bench-baseline job, which installs the same manifest. Image-version-salted
      # like bench-baseline so an image roll re-saves instead of getting stuck on a stale
      # `Restored 0` archive (issue #264 review); the ubuntu legs of both jobs share the same
      # ImageVersion, so the shared-cache invariant holds. (Linux-only, never self-hosted here.)
      - name: Resolve runner image tag (vcpkg ABI cache dimension)
        if: runner.os == 'Linux'
        shell: bash
        run: echo "VCPKG_CACHE_IMAGE_TAG=${ImageVersion:-selfhosted}" >> "$GITHUB_ENV"

      # RESTORE on every ref (shares main's archive via the restore-key prefix); the guarded SAVE at
      # the job end writes ONLY on main, so PR legs never create a branch-scoped copy (P3 reclaim).
      - name: vcpkg binary cache (restore)
        if: runner.os == 'Linux'
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-bin-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-
            vcpkg-bin-${{ runner.os }}-

      # Wiring check (ubuntu only): the spike must also build through the integrated
      # CONTEXT_BUILD_SPIKES=ON path — the same `spikes` preset the bench job uses (vcpkg
      # toolchain, since the sibling spikes' deps come from the manifest's `spikes` feature;
      # V8 leg off — win-only).
      - name: Configure + build via the spikes preset (integration check)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          cmake -S src --preset spikes -DCONTEXT_SPIKE_JSENGINE_V8=OFF
          cmake --build src/build/spikes --target context-spike-webgpu

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      # SAVE the vcpkg archive ONLY on main (P3), Linux-only like the restore; the dir is populated
      # by the integration configure above. PR legs skip this — no per-branch duplicate.
      - name: vcpkg binary cache (save, main only)
        if: runner.os == 'Linux' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}

  # WebGPU spike, web leg: Emscripten + the emdawnwebgpu port binding the BROWSER's WebGPU (the
  # locked web path — NOT a Dawn cross-compile). Proves the same spike source compiles to
  # wasm+JS; the in-browser render run is a local/manual step (see spikes/webgpu/README.md).
  # Toolchain note: this leg compiles with emsdk's bundled LLVM — recorded as 'documented'
  # (unpinned, floats with emsdk 'latest') in cmake/toolchain-versions.json; pinning emsdk is a
  # staged follow-up that lands with the first non-spike web build target.
  spike-webgpu-web:
    name: spike webgpu (web, emscripten)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install emsdk (latest)
        # Retry/backoff (Context-Engine#129): the git clone + `emsdk install latest` both download
        # from GitHub, which was part of the 504 outage wave. rm -rf before each attempt so a
        # retried clone into an existing dir does not fail.
        run: |
          bash tools/ci-retry.sh -- bash -c '
            rm -rf "$RUNNER_TEMP/emsdk" \
              && git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk" \
              && "$RUNNER_TEMP/emsdk/emsdk" install latest \
              && "$RUNNER_TEMP/emsdk/emsdk" activate latest'

      - name: Configure + build (wasm)
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          emcmake cmake -S spikes/webgpu -B build/spike-webgpu-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build/spike-webgpu-web

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: spike-webgpu-web
          path: |
            build/spike-webgpu-web/context-spike-webgpu.html
            build/spike-webgpu-web/context-spike-webgpu.js
            build/spike-webgpu-web/context-spike-webgpu.wasm
          if-no-files-found: error

  # M4 render foundation (src/render/, issue #114): the PRODUCTION T1 native backend
  # (context_render_wgpu over the SHA-pinned wgpu-native prebuilt) + the offscreen pixel-readback
  # proof, driven through the rhi.h abstraction. Generalizes the spike-webgpu job to the promoted
  # subsystem.
  #
  # Policy (M4 visual-equivalence method, ROADMAP §1): Linux-Vulkan is the BLOCKING correctness gate;
  # other backends are advisory. lavapipe (Mesa's software Vulkan rasterizer) gives the ubuntu leg a
  # real adapter, so `render (ubuntu-latest)` runs the real offscreen render/readback and is the
  # authoritative gate. macOS is kept as an advisory desktop signal. Windows native render is
  # INTENTIONALLY NOT run in this job: it is already covered by the `build (windows-latest)` MSVC
  # compile+link leg and the `spike webgpu (windows-latest)` probe, and running the native wgpu-native
  # offscreen build + `ctest -R "^render-wgpu-"` on the Session-0 self-hosted Windows runner crashed
  # non-deterministically on native-GPU teardown (0xc0000409 / STATUS_STACK_BUFFER_OVERRUN) — the same
  # Session-0 carve-out documented in the M1 webgpu spike history (PR #97), where the fix was to NOT run
  # native render on Session-0 Windows. Dropping windows-latest from this matrix removes that crash
  # surface entirely with no loss of Windows coverage. So: build + probe (R-HEAD-002, adapter
  # enumeration, no device) on ubuntu (blocking) and macOS (advisory), with the offscreen render/
  # readback running wherever a software adapter exists (lavapipe on ubuntu; skips cleanly on macOS).
  # The library half (context_render: RHI + extract + double-buffer + detachable renderer) is exercised
  # by the main `build` job's ctest under CONTEXT_BUILD_RENDER_WGPU=OFF, so this job is only the native
  # dependency path.
  render:
    name: render (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # lavapipe (Mesa's software Vulkan rasterizer) gives the ubuntu leg a real adapter, so the
      # offscreen readback self-check actually renders on CI instead of skipping.
      - name: Install software Vulkan adapter (lavapipe)
        if: runner.os == 'Linux'
        # Retry/backoff around apt (Context-Engine#129) so a transient mirror blip is not a hard fail.
        run: bash tools/ci-retry.sh -- bash -c 'sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers'

      # Configure the dev preset with the wgpu backend ON (it fetches + SHA-verifies the pinned
      # wgpu-native prebuilt). The context_render library half already builds in the main `build`
      # job with the toggle OFF; here we only build + test the native offscreen proof.
      - name: Configure (dev preset + wgpu render backend)
        run: cmake -S src --preset dev -DCONTEXT_BUILD_RENDER_WGPU=ON

      - name: Build offscreen proof
        run: cmake --build --preset dev --target context_render_wgpu_offscreen
        working-directory: src

      - name: Run probe + offscreen render/readback
        run: ctest --preset dev -R "^render-wgpu-" --output-on-failure
        working-directory: src

      # --- M4 T7 (issue #141): golden-scene visual-equivalence corpus, NATIVE Linux-Vulkan leg ---
      # Dump every corpus scene through the wgpu backend on lavapipe, then gate each against its
      # committed goldens/ baseline with the named metric (mean block-SSIM + per-scene tolerances,
      # goldens/manifest.json). BLOCKING per the minimal-v1 ruling (Linux-Vulkan + one browser);
      # macOS stays the advisory desktop signal via the probe/skip tests above (no rasterizing
      # adapter there). Fleet manifest: golden-scene-native-linux. Rebaselines are REVIEWED
      # changes, never automatic (goldens/README.md).
      - name: Golden-scene corpus — dump (native, lavapipe)
        if: runner.os == 'Linux'
        run: |
          mkdir -p out/golden-native
          exe=src/build/dev/render/context_render_wgpu_offscreen
          "$exe" golden triangle3d out/golden-native/triangle3d.ppm
          "$exe" golden sprite2d out/golden-native/sprite2d.ppm
          "$exe" golden lit3d out/golden-native/lit3d.ppm
          "$exe" golden viewport out/golden-native/viewport.ppm
          "$exe" golden ui-hud out/golden-native/ui-hud.ppm
          "$exe" golden ui-worldpanel out/golden-native/ui-worldpanel.ppm
          "$exe" golden ui-curvedpanel out/golden-native/ui-curvedpanel.ppm

      - name: Golden-scene SSIM gate (native-vulkan-lavapipe, blocking)
        if: runner.os == 'Linux'
        run: |
          python3 tools/golden_compare.py --scene triangle3d --candidate out/golden-native/triangle3d.ppm
          python3 tools/golden_compare.py --scene sprite2d --candidate out/golden-native/sprite2d.ppm
          python3 tools/golden_compare.py --scene lit3d --candidate out/golden-native/lit3d.ppm
          python3 tools/golden_compare.py --scene viewport --candidate out/golden-native/viewport.ppm
          python3 tools/golden_compare.py --scene ui-hud --candidate out/golden-native/ui-hud.ppm
          python3 tools/golden_compare.py --scene ui-worldpanel --candidate out/golden-native/ui-worldpanel.ppm
          python3 tools/golden_compare.py --scene ui-curvedpanel --candidate out/golden-native/ui-curvedpanel.ppm

      # --- M4 T7 (issue #141): R-QA-007 min-spec floor bench, per-PR methodology proxy ---
      # MEASURE is BLOCKING: the representative lit3d subject must run green end-to-end under the
      # R-QA-009 discipline (median-of-5 runs at the committed floor resolution; results archived
      # below as the time series). The floor ENFORCEMENT is ADVISORY (continue-on-error) until the
      # minspec-desktop-proxy runner class is provisioned — a shared runner + software rasterizer
      # is NOT the named proxy device (R-QA-012 advisory-until-provisioned). Fleet manifest:
      # minspec-floor-proxy-measure / minspec-floor-proxy-gate; floor table: minspec_floors.
      - name: Min-spec floor bench — measure (R-QA-009 median-of-5, blocking)
        if: runner.os == 'Linux'
        run: >
          python3 bench/minspec_floor.py measure
          --exe src/build/dev/render/context_render_wgpu_offscreen
          --platform desktop --runs 5 --frames 30 --warmup 5
          --out out/minspec/results.json

      - name: Min-spec floor gate (R-QA-007, advisory until the proxy runner is provisioned)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: python3 bench/minspec_floor.py gate --results out/minspec/results.json

      - name: Upload golden + min-spec artifacts
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-native-and-minspec
          path: |
            out/golden-native/
            out/minspec/
          if-no-files-found: warn

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # M4 render foundation, WEB leg (src/render/web/, issue #137 T6): the T1 RHI backend on the
  # BROWSER's WebGPU via Emscripten + the emdawnwebgpu port (webgpu.h -> navigator.gpu; the
  # L-56-locked web path, NOT a Dawn cross-compile). Generalizes the `spike-webgpu-web` job to the
  # promoted subsystem — the SAME rhi.h implementation as the native `render` job (context_render_wgpu),
  # compiled to wasm+JS from the standalone src/render/web target, rendering the same triangle (3D
  # pipeline) + sprite (2D) T1 proofs the native offscreen exe runs. This is the M4 "one browser
  # blocking backend" build gate (ROADMAP §1); the in-browser render RUN + the golden-scene SSIM
  # gate are the T7 follow-up (GH runners have no browser+WebGPU). Toolchain note: emsdk `latest`
  # (bundled emdawnwebgpu port), recorded 'documented'/unpinned in cmake/toolchain-versions.json like
  # the spike-webgpu-web leg — pinning emsdk is a staged follow-up.
  render-web:
    name: render (web, emscripten)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install emsdk (latest)
        # Retry/backoff (Context-Engine#129): the git clone + `emsdk install latest` both download
        # from GitHub. rm -rf before each attempt so a retried clone into an existing dir does not fail.
        run: |
          bash tools/ci-retry.sh -- bash -c '
            rm -rf "$RUNNER_TEMP/emsdk" \
              && git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk" \
              && "$RUNNER_TEMP/emsdk/emsdk" install latest \
              && "$RUNNER_TEMP/emsdk/emsdk" activate latest'

      - name: Configure + build (wasm)
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          emcmake cmake -S src/render/web -B build/render-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build/render-web

      # --- M4 T7 (issue #141): the in-browser golden run — the "one browser blocking" gate ---
      # Runs the just-built harness in headless CHROMIUM (the v1 blocking browser — the only
      # browser shipping WebGPU on headless Linux; the design record's reference browser since the
      # M0 Tint/Chrome spike) over SwiftShader WebGPU (the browser analog of lavapipe), collects
      # the corpus frames the harness POSTs back over its own origin (tools/web_golden_run.py),
      # and gates them against the SAME goldens/ baselines the native leg uses. This closes the M4
      # exit "render 3D+2D desktop+web, identical within T1" criterion. Fleet manifest:
      # golden-scene-web-chromium.
      - name: In-browser golden run (headless Chromium + SwiftShader WebGPU)
        run: |
          google-chrome --version
          python3 tools/web_golden_run.py             --html build/render-web/context-render-web.html             --out-dir out/golden-web --scenes triangle3d,sprite2d,ui-hud

      - name: Golden-scene SSIM gate (browser-chromium-swiftshader, blocking)
        run: |
          python3 tools/golden_compare.py --scene triangle3d --candidate out/golden-web/triangle3d.ppm
          python3 tools/golden_compare.py --scene sprite2d --candidate out/golden-web/sprite2d.ppm
          python3 tools/golden_compare.py --scene ui-hud --candidate out/golden-web/ui-hud.ppm

      # --- M8 a11 (web export adapter): the packed web build BOOTS + STREAMS its pack in chunks ---
      # The context-web-export harness (built above by the same `cmake --build build/render-web`) is
      # the browser side of `context build --target web`: it fetches the served content/game.pack over
      # HTTP RANGE requests, streams it into the a02 RuntimeContentLoader within a fixed memory budget
      # (WebPackStreamer), then renders the triangle3d golden through the browser's WebGPU. The stream
      # verdict is enforced by the harness EXIT CODE (0 requires stream-within-budget AND WebGPU boot,
      # which web_golden_run.py checks); the triangle3d frame it POSTs is SSIM-gated below — the DoD's
      # "boots in headless Chromium + passes the golden-scene SSIM corpus" for the packed web build.
      # The pack is a committed real v1 fixture (src/render/web/testdata/web-sample.pack, built by
      # `context build --target web`), served beside the harness page for the range fetch.
      - name: In-browser web-export run (stream pack over HTTP range + WebGPU boot)
        run: |
          mkdir -p build/render-web/content
          cp src/render/web/testdata/web-sample.pack build/render-web/content/game.pack
          python3 tools/web_golden_run.py \
            --html build/render-web/context-web-export.html \
            --out-dir out/web-export --scenes triangle3d

      - name: Web-export golden SSIM gate (blocking)
        run: |
          python3 tools/golden_compare.py --scene triangle3d --candidate out/web-export/triangle3d.ppm

      - name: Upload wasm + web golden artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: render-web
          path: |
            build/render-web/context-render-web.html
            build/render-web/context-render-web.js
            build/render-web/context-render-web.wasm
            build/render-web/context-web-export.html
            build/render-web/context-web-export.js
            build/render-web/context-web-export.wasm
            out/golden-web/
            out/web-export/
          if-no-files-found: error

  # Native shader cross-compile TOOLCHAIN de-risk (src/render/shadercc/, issue #125, sub-task B of
  # #119): make glslang + SPIRV-Cross + SPIRV-Tools (the vcpkg `shader-crosscompile` manifest feature)
  # AVAILABLE + CI-proven to build/link behind the default-OFF CONTEXT_BUILD_SHADER_CROSSCOMPILE flag —
  # mirroring the render (CONTEXT_BUILD_RENDER_WGPU) dependency-path job. It does NOT wire cross-compile
  # logic into the engine (that is sub-task C, behind material/'s IShaderCompiler seam); it only builds
  # the toolchain + runs a glslang->SPIR-V smoke (validated by SPIRV-Tools, reflected by SPIRV-Cross).
  #
  # This is a CPU compile path — there is NO GPU / native-render leg here, so (unlike the render/build
  # jobs) it runs on the GH-hosted trio: vcpkg is preinstalled as $VCPKG_INSTALLATION_ROOT and the
  # toolchain builds from source under the vcpkg triplet compiler. Uniform `shell: bash` (Git Bash on
  # the Windows GH runner) keeps the 3-OS steps identical.
  #
  # Policy (standing M4 CI policy, issue #125): Linux is the BLOCKING build/link/smoke gate; macOS and
  # Windows are ADVISORY (continue-on-error) desktop-parity signals — a red advisory leg never blocks
  # the PR. Default-OFF means the main `build` matrix + the local dev gate never resolve this toolchain.
  shader-crosscompile:
    name: shader-crosscompile (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
    steps:
      - uses: actions/checkout@v7

      # Apply the same per-job toolchain + build-environment composites every other build-capable
      # job uses (build, bench-baseline, spike-*, render): on the BLOCKING Linux leg pinned-toolchain
      # installs/exports the L-42 pinned clang (CC/CXX) and setup-build-env exports CMAKE_GENERATOR=Ninja
      # + the sccache launchers (the shader-crosscompile preset inherits `base` and sets no generator,
      # so without this the configure would fall back to Unix Makefiles and skip compiler caching).
      # Both are safe no-ops on GH-hosted Windows (informational / default-VS-generator) and advisory on
      # macOS — identical to how the matrix spike-* jobs apply them across the trio.
      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # Persist the built glslang/spirv-cross/spirv-tools archives across runs so the from-source
      # vcpkg build only pays full cost on a manifest change (key = src/vcpkg.json +
      # src/vcpkg-configuration.json hash). The runner IMAGE version salts the primary key so an
      # image roll (which rolls the runner-default MSVC/AppleClang, and hence vcpkg's ABI hash)
      # forces a fresh key + re-save instead of getting stuck on a stale `Restored 0` archive —
      # the ~30-min win/mac symptom this task fixes (issue #264 review). ImageVersion is a
      # runner-injected env var (absent from ${{ env }}); resolve it in a shell step, with a
      # stable `selfhosted` fallback for self-hosted runners. The distinct vcpkg-bin-shadercc-
      # key prefix (vs the bench/spike vcpkg-bin- key) is preserved. No branch/sha/run_id.
      - name: Resolve runner image tag (vcpkg ABI cache dimension)
        shell: bash
        run: echo "VCPKG_CACHE_IMAGE_TAG=${ImageVersion:-selfhosted}" >> "$GITHUB_ENV"

      # RESTORE on every ref (shares main's shadercc archive via the restore-key prefix); the guarded
      # SAVE at the job end writes ONLY on main, so PR legs never create a branch-scoped ~500-800 MB
      # copy — this is the dominant budget reclaim (P3), the shadercc vcpkg cache being the largest.
      - name: vcpkg binary cache (restore)
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-shadercc-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-bin-shadercc-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-
            vcpkg-bin-shadercc-${{ runner.os }}-

      # The WGSL leg's pinned tools (issue #133, sub-task D of #119 — measured ruling:
      # docs/wgsl-tool-decision.md): tint (the wired SPIR-V->WGSL tool, built from Dawn source at
      # the tag pinned in tools/tint-toolchain.json — minutes-class, commit-verified fail-closed)
      # and naga-cli (the roundtrip test's native-consumer WGSL cross-validator, cargo-installed at
      # the pin in tools/naga-toolchain.json). Both caches are keyed on their pin manifest, so a pin
      # bump rebuilds exactly once per OS; on a cache hit the fetch scripts are no-ops needing
      # neither cargo nor a compiler. No restore-keys: a stale tool must never satisfy a new pin.
      # RESTORE both tool caches on every ref; the guarded SAVEs at the job end write ONLY on main
      # (P3 — uniform with the vcpkg caches). No restore-keys (a stale tool must never satisfy a new
      # pin — a pin bump is an exact-key miss that rebuilds once, then main re-saves).
      - name: WGSL tool cache (tint, restore)
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/tint-tool
          key: tint-tool-${{ runner.os }}-${{ hashFiles('tools/tint-toolchain.json') }}

      - name: WGSL tool cache (naga, restore)
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/naga-tool
          key: naga-tool-${{ runner.os }}-${{ hashFiles('tools/naga-toolchain.json') }}

      - name: Stage pinned WGSL tools (tint + naga)
        run: |
          # macOS GH images ship no Rust toolchain; bootstrap a minimal one ONLY when needed (the
          # cache-hit path needs no cargo). rustup.rs is the publisher TLS channel; retry-wrapped
          # like every other external download in CI (Context-Engine#132 posture).
          if ! command -v cargo >/dev/null 2>&1 && [ ! -d "${RUNNER_TEMP}/naga-tool/bin" ]; then
            bash tools/ci-retry.sh -- bash -c "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          PY="$(command -v python3 || command -v python)"
          "$PY" tools/fetch_naga.py --dest "${RUNNER_TEMP}/naga-tool"
          "$PY" tools/fetch_tint.py --dest "${RUNNER_TEMP}/tint-tool"
          echo "${RUNNER_TEMP}/naga-tool/bin" >> "$GITHUB_PATH"
          echo "${RUNNER_TEMP}/tint-tool/bin" >> "$GITHUB_PATH"

      # The shader-crosscompile preset pulls the toolchain via the vcpkg manifest feature
      # (VCPKG_MANIFEST_FEATURES=shader-crosscompile) under the vcpkg toolchain ($VCPKG_ROOT) and sets
      # CONTEXT_BUILD_SHADER_CROSSCOMPILE=ON. GH-hosted runners preinstall vcpkg as
      # $VCPKG_INSTALLATION_ROOT (same as the bench-baseline job).
      - name: Configure (shader-crosscompile toolchain, vcpkg)
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          cmake -S src --preset shader-crosscompile

      # Scope the build to this job's designed charter (issue #264): the `shadercc-tests` umbrella
      # target (src/render/shadercc/CMakeLists.txt) builds the toolchain link-proof/smoke + every
      # shader-* proof executable — NOT the whole engine + all test exes. Every shader-* ctest's
      # executable is a dependency of the umbrella, so the `-R "^shader-"` ctest below never selects
      # a test whose exe was not built ("Not Run = RED" tripwire). The full 339-test suite stays
      # gated by the blocking 3-OS `build` job; this job proves only the shadercc dependency path.
      - name: Build the shadercc toolchain link-proof + shader-* proofs
        run: cmake --build --preset shader-crosscompile --target shadercc-tests
        working-directory: src

      - name: Run the shader-crosscompile ctests (smoke + author->SPIR-V->{HLSL,MSL,GLSL,WGSL} roundtrip)
        run: ctest --preset shader-crosscompile --output-on-failure -R "^shader-"
        working-directory: src

      # SAVE the shadercc vcpkg + WGSL tool archives ONLY on main (P3); the dirs are populated by the
      # configure + tool-staging steps above. PR legs skip these — no per-branch duplicates.
      - name: vcpkg binary cache (save, main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-shadercc-${{ runner.os }}-${{ env.VCPKG_CACHE_IMAGE_TAG }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}

      - name: WGSL tool cache (tint, save, main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/tint-tool
          key: tint-tool-${{ runner.os }}-${{ hashFiles('tools/tint-toolchain.json') }}

      - name: WGSL tool cache (naga, save, main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/naga-tool
          key: naga-tool-${{ runner.os }}-${{ hashFiles('tools/naga-toolchain.json') }}

  # M5-F0a CEF build substrate (src/editor/cef/, issue #150; L-15 / L-41 / R-UI-007 / R-SEC-009): fetch
  # + SHA-256-verify the pinned CEF prebuilt (tools/fetch_cef.py, verify-before-use fail-closed), build
  # libcef_dll_wrapper from the distribution, link a minimal headless boot substrate, and BOOT a CEF
  # browser subprocess headless (`cef-substrate-boot` ctest → exit 0). A CI-gated dependency path like
  # the `render` job (CONTEXT_BUILD_RENDER_WGPU): the MSVC/Clang-ABI CEF prebuilt cannot link under the
  # local Strawberry-GCC dev gate, so it is built + booted ONLY here behind -DCONTEXT_BUILD_GUI_CEF=ON.
  # The main `build` job already compiles src/editor/cef with the toggle OFF (it early-returns), so this
  # job is only the native CEF dependency path. This is the build-SUBSTRATE smoke (fetch → verify → link
  # → headless boot), NOT the editor host boot smoke (that is M5-F0b — no host / panels / RPC here).
  #
  # Policy: Linux is the primary boot leg (headless under xvfb, GPU disabled). Windows rides the
  # SELF-HOSTED MSVC runner (standing M4 CI policy: no new Windows GPU legs — this leg disables the GPU;
  # the boot code hard-exits after success to skip CEF's flaky Session-0 teardown, the same carve-out
  # src/render/ documents). macOS boots the bundled app (arm64 = the macos-latest Apple-Silicon runner,
  # matching the aarch64-apple-darwin pin). The pinned CEF archive (~123-311 MB) is fetched ONCE at
  # configure time (fetch_cef.py retry/backoff) and CACHED across runs keyed on the pin manifest hash
  # (version-keyed cache) so CI cost stays bounded — the download hardening the issue asks for.
  cef-substrate:
    name: cef-substrate (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # Version-keyed cache of the fetched + extracted CEF distribution: the ~123-311 MB archive is
      # downloaded once per pin and reused (keeps CI cost bounded). Keyed on the pin manifest hash so a
      # pin bump invalidates it and re-fetches; no restore-keys (a stale CEF must never satisfy a new
      # pin). fetch_cef.py's idempotency stamp short-circuits the download on a cache hit.
      - name: CEF prebuilt cache
        uses: actions/cache@v6
        with:
          path: src/build/dev/_cef
          key: cef-prebuilt-${{ runner.os }}-${{ hashFiles('tools/cef-prebuilt.json') }}

      # CEF's Linux runtime dependencies + xvfb (even OSR/windowless CEF needs an X display connection
      # to initialize its ozone/X11 backend on Linux). Retry-wrapped like the render job's lavapipe step.
      - name: Install CEF runtime deps + xvfb (Linux)
        if: runner.os == 'Linux'
        run: >
          bash tools/ci-retry.sh -- bash -c 'sudo apt-get update && sudo apt-get install -y
          libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0
          libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2
          libasound2t64 libatspi2.0-0 libxshmfence1 libx11-dev xvfb'

      - name: Configure (dev preset + CEF GUI substrate)
        run: cmake -S src --preset dev -DCONTEXT_BUILD_GUI_CEF=ON

      - name: Build the CEF boot substrate
        run: cmake --build --preset dev --target context_cef_boot_smoke
        working-directory: src

      # Boot the CEF browser subprocess headless and assert exit 0. Linux runs under xvfb; macOS +
      # Windows run the bundled/staged binary directly (GPU disabled — no adapter required anywhere).
      - name: Boot-substrate ctest (Linux, headless under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --preset dev -R "^cef-substrate-" --output-on-failure
        working-directory: src

      - name: Boot-substrate ctest (macOS / Windows)
        if: runner.os != 'Linux'
        run: ctest --preset dev -R "^cef-substrate-" --output-on-failure
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # M5-F0b CEF editor host boot smoke (src/editor/gui/, issue #152; R-EDIT-001 / R-UI-007 / L-41 /
  # R-A11Y-001 / R-SEC-007): boot the CEF editor HOST headless, register the built-in placeholder panel
  # through the R-EDIT-001 extension contract, attach the capability-scoped bridge + run ONE command,
  # select the L-41 surface mode, RENDER the placeholder panel, exit 0 (`editor-cef-smoke-boot` ctest).
  # Distinct from cef-substrate (M5-F0a), which only proves the CEF fetch/link/headless boot with NO
  # host / panels / RPC. This job is the editor-host boot smoke the M5 exit criterion requires per OS.
  #
  # A CI-only dependency path like cef-substrate: the MSVC/Clang-ABI CEF prebuilt cannot link under the
  # local Strawberry-GCC dev gate, so the host is built + booted ONLY here behind -DCONTEXT_BUILD_GUI_CEF
  # =ON. The three headless gui libs it links (uitree/contract/compositor) are ALSO unit-tested WITHOUT
  # CEF on the default `build` matrix (ctest gui-*). Policy: Linux is the primary boot leg (BLOCKING per
  # the M5 exit — headless under xvfb, GPU disabled); Windows rides the self-hosted MSVC runner (no new
  # Windows GPU legs — GPU disabled, hard-exit after success to skip CEF's flaky Session-0 teardown);
  # macOS boots the bundled app (arm64). Models cef-substrate verbatim (CEF fetch + apt deps + xvfb +
  # per-PID root_cache_path + version-keyed cache), so the two jobs share the fetched CEF cache.
  editor-cef-smoke:
    name: editor-cef-smoke (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # Version-keyed cache of the fetched + extracted CEF distribution — the SAME key as cef-substrate
      # so the two CEF jobs share one download. Keyed on the pin manifest hash (a pin bump re-fetches).
      - name: CEF prebuilt cache
        uses: actions/cache@v6
        with:
          path: src/build/dev/_cef
          key: cef-prebuilt-${{ runner.os }}-${{ hashFiles('tools/cef-prebuilt.json') }}

      # CEF's Linux runtime dependencies + xvfb (windowless CEF still needs an X display to init its
      # ozone/X11 backend on Linux). Retry-wrapped like cef-substrate.
      - name: Install CEF runtime deps + xvfb (Linux)
        if: runner.os == 'Linux'
        run: >
          bash tools/ci-retry.sh -- bash -c 'sudo apt-get update && sudo apt-get install -y
          libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0
          libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2
          libasound2t64 libatspi2.0-0 libxshmfence1 libx11-dev xvfb'

      - name: Configure (dev preset + CEF GUI host)
        run: cmake -S src --preset dev -DCONTEXT_BUILD_GUI_CEF=ON

      # a11y-harness HOOK (R-A11Y-001): the headless automated accessibility + keyboard-only navigation
      # audit over the placeholder panel's UI-logic tree (gui-uitree-test_a11y), run here per-OS as the
      # M5 a11y gate hook. A later task HARDENS it with the CEF/axe DOM scan + a real keyboard-driver
      # test against the booted host DOM; the headless audit is the present, green hook.
      - name: a11y-harness hook (headless a11y + keyboard-nav audit)
        run: |
          cmake --build --preset dev --target context_gui_uitree_test_a11y
          ctest --preset dev -R "^gui-uitree-test_a11y$" --output-on-failure
        working-directory: src

      # M5-F6 (R-A11Y-001, issue #154): the hardened a11y ENFORCEMENT gate over the F0b hook above.
      # Build + run the headless per-panel harness (context_gui_a11y_scan — semantic/ARIA audit +
      # keyboard-only focus order over every REGISTERED panel; the gui-a11y-* ctests also run on the
      # default 3-OS `build` matrix, so Windows/macOS a11y is covered there), then dump the report and
      # run tools/a11y_scan.py for the axe-class DOM re-scan + coverage-manifest cross-check. Pure
      # stdlib + headless (no CEF, no xvfb needed). BLOCKING on the Linux leg per the M5 exit.
      - name: a11y enforcement gate (per-panel scan + keyboard-nav + coverage, Linux blocking)
        if: runner.os == 'Linux'
        run: |
          cmake --build --preset dev --target context_gui_a11y_scan context_gui_a11y_test_harness context_gui_a11y_test_coverage
          ctest --preset dev -R "^gui-a11y-" --output-on-failure
          a11y_scan_exe="$(find build/dev -type f -name context_gui_a11y_scan | head -n1)"
          "$a11y_scan_exe" --out build/dev/a11y-report.json
          python3 ../tools/a11y_scan.py --report build/dev/a11y-report.json --manifest editor/gui/a11y/coverage.manifest.jsonl
        working-directory: src

      - name: Build the CEF editor host
        run: cmake --build --preset dev --target context_gui_host
        working-directory: src

      # Boot the CEF editor host headless and assert exit 0. Linux runs under xvfb; macOS + Windows run
      # the bundled/staged binary directly (GPU disabled — no adapter required anywhere).
      - name: Editor-host boot smoke ctest (Linux, headless under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --preset dev -R "^editor-cef-smoke-" --output-on-failure
        working-directory: src

      - name: Editor-host boot smoke ctest (macOS / Windows)
        if: runner.os != 'Linux'
        run: ctest --preset dev -R "^editor-cef-smoke-" --output-on-failure
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # ------------------------------------------------------------------------------------------------
  # M8.5 a21 — R-FILE-011 orchestration-density bench (ticks/sec/instance + instances-per-box).
  # The wedge-pillar-1 demo shape (ARCHITECTURE §1.1): N headless PACKED instances (the a06
  # context_runtime_server over a `context build` v1 pack) stepped/seeded/hashed in parallel from ONE
  # controller (bench/density.py) over the R-QA-005 session surface. Per-PR proxy ladder (1,2,4 on the
  # 4-vCPU shared runner); the FULL ladder runs nightly in bench-nightly.yml (`density-nightly`).
  # The JOB is BLOCKING (the controller + instances must run green end-to-end: boot ok, simTick
  # exact, same-seed determinism pair bit-identical); the numeric GATE vs the committed floors in
  # bench/density-targets.json is ADVISORY (continue-on-error) — a shared GH runner is NOT the
  # perf-isolated `perf-linux-bare-metal` runner class the fleet manifest names (ops1 deferred,
  # owner ruling 2026-07-18; R-QA-012 advisory-until-provisioned; docs/density-targets.md). The
  # blocking flip is a FUTURE step gated on ops1.
  density-bench:
    name: density bench (packed instances, ubuntu)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the CLI + shipped server runtime host
        run: cmake --build --preset dev --target context context_runtime_server
        working-directory: src

      # The bench subject: a real v1 pack over the minimal buildable project (the same printf
      # pattern the build-time-bench / linux-export jobs use; L-33 hex ids on every entity).
      - name: Build a v1 pack for the density subject
        shell: bash
        run: |
          set -euo pipefail
          PROJ="$(mktemp -d)"
          mkdir -p "$PROJ/scenes"
          printf '%s' '{"$schema":"ctx:project","scene":"scenes/main.scene.json","version":1}' > "$PROJ/project.json"
          printf '%s' '{"$schema":"ctx:scene","version":1,"entities":[{"id":"aaaa0000aaaa0001","name":"Camera","components":{"camera":{"fov":1.0}}},{"id":"aaaa0000aaaa0002","name":"Player","components":{"transform":{}}}]}' > "$PROJ/scenes/main.scene.json"
          src/build/dev/cli/context build --target linux --flavor server --project "$PROJ" \
            --out "$PROJ/server.pack" --runtime "$PWD/src/build/dev/runtime/host/context-runtime-server"
          echo "DENSITY_PACK=$PROJ/server.pack" >> "$GITHUB_ENV"

      - name: Run the density controller (median-of-5, R-QA-009 discipline; per-PR proxy ladder)
        run: >
          python3 bench/density.py measure
          --server ./src/build/dev/runtime/host/context-runtime-server
          --pack "$DENSITY_PACK"
          --ticks 600000 --ladder 1,2,4 --runs 5
          --label ci-ubuntu-density-proxy --runner-class gh-ubuntu-shared
          --out bench/results/density-ci-proxy

      # Advisory numbers gate (same contract as the bench-baseline / bench-attach / build-time
      # gates): archives the time series + emits the density table; never red-Xs the rollup here.
      - name: Density gate (R-FILE-011, advisory until the perf box is provisioned)
        continue-on-error: true
        run: >
          python3 bench/density.py gate
          --result bench/results/density-ci-proxy.json
          --targets bench/density-targets.json
          --archive bench/results/archive
          --out bench/results/density-table

      - name: sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload density results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: density-results
          path: bench/results/
          if-no-files-found: error
