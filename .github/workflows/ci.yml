# Context Engine CI — M0 bootstrap.
#
# GH-hosted runners ONLY for now: migrating the Windows leg to the org's self-hosted Windows
# runner is a deliberate later follow-up, not part of the M0 bootstrap.
#
# Toolchain (L-42): per-target pins live in cmake/toolchain-versions.json — the versioned,
# DECLARED target-vs-actual toolchain manifest. The pinned-toolchain composite action
# (.github/actions/pinned-toolchain, backed by tools/check_toolchain.py) applies it in every
# build job: ubuntu installs + strictly verifies the pinned clang from apt.llvm.org and exports
# CC/CXX; macOS advisory-verifies the recorded Apple clang (the manifest's honest temporary
# reality); Windows stays on documented MSVC — clang-cl adoption is a staged follow-up recorded
# in the manifest.
#
# Compiler caching: sccache with the GitHub-Actions cache backend on the ubuntu/macos legs,
# applied by the setup-build-env composite action (.github/actions/setup-build-env), which also
# exports the shared CMake configure environment (Ninja on non-Windows). The Windows/MSVC legs
# skip it deliberately: the Visual Studio generator ignores CMAKE_<LANG>_COMPILER_LAUNCHER,
# and sccache+MSVC is not worth fighting until the clang-cl follow-up lands.
#
# Fail-fast gating: the two ~10-second gates (license-gate, python-tests) front the heavyweight
# build/spike/bench jobs via `needs:` — a red gate stops ~12 heavy legs before they start, at
# the cost of a short serialization on green runs.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Disabled (cost cut, 2026-07-05): the GHA cache backend was spawning ~44 cache entries per
  # run (611 MB / 7,460 entries observed — the repo's dominant Actions-storage cost). sccache
  # still runs via CMAKE_<LANG>_COMPILER_LAUNCHER (set by .github/actions/setup-build-env) but
  # falls back to passthrough/no-cache mode with no backend configured — builds stay green,
  # just without cross-run compiler-object caching.
  SCCACHE_GHA_ENABLED: "false"
  # Self-hosted-runner safety (2026-07-08): the three Windows CI jobs run as LocalSystem services
  # on ONE machine and share `C:\WINDOWS\system32\config\systemprofile\.gitconfig`. A per-job
  # `git config --global --add safe.directory '*'` step raced on `.gitconfig.lock` when >1 runner
  # ran concurrently ("could not lock config file ...: File exists"). Inject `safe.directory=*`
  # through git's environment instead — this writes NO file, so concurrent runners never collide.
  # Applies to every git invocation in every step (GH-hosted legs unaffected; the value is inert).
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"

jobs:
  license-gate:
    name: dependency-license gate (deny-by-default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run license gate
        run: python3 tools/check_licenses.py

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  # Fast pytest gate over the repo's Python tooling (R-QA-013 retroactive coverage):
  # tools/tests (license gate + toolchain-manifest gate) + bench/tests (seeded corpus
  # generator).
  python-tests:
    name: python tests (license gate + toolchain gate + corpus generator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run Python test suites
        run: python3 -m pytest tools/tests bench/tests -v

      # R-QA-012: CI CONSUMES the fleet manifest — validate it against the live workflows every run
      # (self-consistency + the advisory-until-provisioned rule + ci_job_id sync across BOTH the
      # per-PR rollup and the nightly benchmark workflow). See docs/ci-fleet-manifest.md.
      - name: Validate CI fleet manifest (R-QA-012)
        run: >
          python3 tools/check_fleet_manifest.py --manifest docs/ci-fleet-manifest.json
          --ci-workflow .github/workflows/ci.yml
          --ci-workflow .github/workflows/bench-nightly.yml

  build:
    name: build (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # Build files live in src/ (root stays minimal): configure with -S src; build/test
      # presets resolve CMakePresets.json from the working directory, so those run in src/.
      - name: Configure
        run: cmake -S src --preset dev

      - name: Build
        run: cmake --build --preset dev
        working-directory: src

      # Every registered suite EXCEPT the M1 + M2 exit gates, the M3 determinism gate, and the
      # samples-corpus gate — those families run in their own named steps below so each milestone/QA
      # gate is legible per OS leg (same tests, each runs exactly once).
      - name: Run test suites (ctest)
        run: ctest --preset dev --verbose -E "^m1-exit-|^m2-exit-|^determinism-|^samples-corpus"
        working-directory: src

      # The M1 EXIT GATE (ROADMAP §1 M1 Exit / issue #36) — the five exit criteria as a BLOCKING
      # per-PR check on every OS leg (§6 tiering): files-as-truth equivalence (L-19), second-CLI
      # live attach (R-CLI-010), real kill-9 crash recovery (R-FILE-004), CLI ≡ RPC ≡ MCP ≡
      # introspection parity + additive-only error catalog (R-CLI-008/009), and dispatcher scope
      # enforcement (R-SEC-007). Registered in docs/ci-fleet-manifest.json as the m1-exit-* gates.
      - name: M1 exit gate (5 criteria, blocking)
        run: ctest --preset dev --output-on-failure -R "^m1-exit-"
        working-directory: src

      # The M2 EXIT GATE (ROADMAP §1 M2 Exit / issue #68) — the milestone-closing mirror of the M1
      # gate: five exit scenarios + the data-model seam checklist as a BLOCKING per-PR check on every
      # OS leg. Author-from-CLI + stable refs (L-19/34/37), schema migration round-trip (L-37), flatten
      # to GUID-addressable independently-loadable content units (R-ASSET-005), composed write +
      # provenance (R-CLI-006), per-payload migration vs the R-QA-011 fixtures, and the executable
      # data-model seam audit. Registered in docs/ci-fleet-manifest.json as the m2-exit-* gates.
      - name: M2 exit gate (5 criteria + seam audit, blocking)
        run: ctest --preset dev --output-on-failure -R "^m2-exit-"
        working-directory: src

      # The M3 DETERMINISM GATE (R-QA-005 / L-54, issue #74) — a BLOCKING per-PR check whose matrix
      # NAMES its platforms: this build job runs on ubuntu-latest (Linux-x64), windows-latest
      # (Win-x64), and macos-latest (macOS-ARM64, Apple Silicon), so the `determinism-*` ctest family
      # — a fixed seed + fixed input stream stepped to a fixed tick count, asserted against a
      # cross-platform GOLDEN hierarchical state-hash — runs on all three, and ANY per-platform
      # divergence turns that leg red. Registered in docs/ci-fleet-manifest.json as determinism-state-hash.
      - name: Determinism gate (R-QA-005 / L-54, blocking — Linux-x64 / Win-x64 / macOS-ARM64)
        run: ctest --preset dev --output-on-failure -R "^determinism-"
        working-directory: src

      # The SAMPLES CORPUS gate (R-QA-006 agent few-shot corpus; R-BUILD-009 / R-QA-008, issue #106)
      # — a BLOCKING per-PR check on every OS leg: the maintained sample projects under samples/ build
      # + headless-smoke-run through the REAL `context` binary (rots-if-broken), and the corpus is
      # asserted to exercise the breadth of the R-CLI-009 registry surface (the stable one-shot CLI
      # verbs ≡ RPC methods ≡ MCP tools, plus every registered file kind) — the M3-exit contract-freeze
      # READINESS artifact (it does NOT freeze; protocolMajor stays 0). Registered in
      # docs/ci-fleet-manifest.json as the samples-corpus gate.
      - name: Samples corpus gate (R-QA-006 / R-BUILD-009 / R-QA-008, blocking)
        run: ctest --preset dev --output-on-failure -R "^samples-corpus"
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # L-38 locks sanitizer- and TSan-gated CI from day one, but TSan cannot combine with
  # ASan/UBSan in one binary — hence one matrixed job building each preset separately (the
  # per-entry `name:` preserves the two historical check names). M0 has no threaded engine
  # code yet (spikes are exempt from the sanitizer gate), so today this builds+runs
  # context-hello under each sanitizer to keep the presets proven and the jobs wired; the
  # TSan leg grows real coverage with M1's threaded kernel code (the L-38 auto-parallel
  # scheduler).
  sanitize:
    name: ${{ matrix.name }}
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: sanitize
            name: sanitize (ASan+UBSan, ubuntu)
          - preset: tsan
            name: sanitize (TSan, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (${{ matrix.preset }} preset)
        run: cmake -S src --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
        working-directory: src

      - name: Run context-hello under the sanitizer
        run: ctest --preset ${{ matrix.preset }} --verbose
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # R-FILE-011 benchmark baseline on a SMALL corpus (10k files). GH-hosted runners are
  # NOT the R-QA-009 perf-isolated runner class — this job is a trend gauge + harness
  # smoke (results archived as artifacts), not a gating floor. The full 100k corpus run
  # stays local/perf-box. Spike targets are opt-in (the `spikes` preset), so the default
  # build matrix above stays vcpkg-free.
  bench-baseline:
    name: bench baseline (10k corpus, ubuntu)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # vcpkg binary caching: persist the built spike-dep archives across runs via
      # actions/cache (vcpkg's own GHA backend, x-gha, was removed upstream — the 'files'
      # provider pointed at a cached workspace dir is the supported replacement). The key
      # is shared with the spike-webgpu integration leg, which installs the same manifest.
      - name: vcpkg binary cache
        uses: actions/cache@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}
          restore-keys: vcpkg-bin-${{ runner.os }}-

      - name: Generate seeded 10k corpus
        run: python3 bench/gen_corpus.py --size 10000 --out bench/corpora/corpus-10k --jobs 4

      # The `spikes` preset owns the flag group (vcpkg toolchain via $VCPKG_ROOT,
      # VCPKG_MANIFEST_FEATURES=spikes, CONTEXT_BUILD_SPIKES=ON, Release); its binaryDir is
      # src/build/spikes, and src/CMakeLists.txt pins spike binary dirs to
      # ${CMAKE_BINARY_DIR}/spikes/<x> — hence the subject path below.
      #
      # CEF spike stays OUT of CI by design: CONTEXT_BUILD_SPIKE_CEF is deliberately NOT set
      # here (CEF's pinned binary distribution is a ~162 MB download / ~460 MB extracted —
      # would wreck job time and runner cache for zero signal, since the spike's render/input
      # proof needs a GPU + interactive desktop anyway). With CONTEXT_BUILD_SPIKES=ON this
      # configure still ENTERS spikes/cef-compositing/CMakeLists.txt, which early-returns —
      # that configure-only exercise is the CI-side proof the spike's CMake stays valid.
      # Measured results live in spikes/cef-compositing/FINDINGS.md (local Windows runs).
      - name: Configure (spikes preset, vcpkg toolchain)
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          cmake -S src --preset spikes

      - name: Build parse-bench
        run: cmake --build --preset spikes --target context-parse-bench
        working-directory: src

      - name: Canonical fixpoint check (serialize∘parse == identity on canonical input)
        run: >
          ./src/build/spikes/spikes/parse-bench/context-parse-bench canon-check
          --corpus bench/corpora/corpus-10k --sample 500

      - name: Run harness (median-of-5, R-QA-009 discipline)
        run: >
          python3 bench/harness.py
          --subject ./src/build/spikes/spikes/parse-bench/context-parse-bench
          --corpus bench/corpora/corpus-10k
          --runs 5 --single-thread-attach --count 2000
          --out bench/results/ci-ubuntu-10k --label ci-ubuntu-10k

      # R-QA-009 perf gate wired to the 10k benchmark. ADVISORY (continue-on-error): a shared
      # GitHub runner is NOT the perf-isolated `perf-linux-bare-metal` runner class the manifest
      # names, so its numbers cannot gate (docs/perf-gate-methodology.md rule 1 + the R-QA-012
      # advisory-until-provisioned contract). It records the measurement to the time-series archive
      # and, once a baseline exists, reports drift — it never red-Xs the rollup here.
      - name: Perf gate (R-QA-009, advisory until the perf box is provisioned)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/ci-ubuntu-10k.json
          --scenario attach
          --baseline bench/baselines/attach-ci-ubuntu-10k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench/results/
          if-no-files-found: error

  # R-FILE-011 per-PR proxy on the REAL attach pipeline (issue #38; §6 tiering: the 10k-file
  # variant is the blocking per-PR stand-in for the 100k gate until M3). The JOB is BLOCKING — the
  # real filesync-reconcile-index + derivation-graph + daemon-boot loop must run green end to end
  # on the 10k corpus, and the R-FILE-011 per-stage budget-table extraction must succeed — while
  # the perf NUMBERS stay advisory (a shared GitHub runner is NOT the R-QA-009 perf-isolated
  # `perf-linux-bare-metal` class; the manifest's advisory-until-provisioned contract applies).
  # The FULL 100k benchmark + the query/sustained/daemons/dense scenarios run NIGHTLY in
  # .github/workflows/bench-nightly.yml (advisory/trend). Distinct from bench-baseline below,
  # which keeps the M0 parse-bench FILE-FORMAT baseline + canonical-fixpoint smoke.
  bench-attach-10k:
    name: bench attach proxy (10k, real pipeline, ubuntu)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the context CLI
        run: cmake --build --preset dev --target context
        working-directory: src

      - name: Generate seeded 10k corpus
        run: python3 bench/gen_corpus.py --size 10000 --out bench/corpora/corpus-10k --jobs 4

      # attach (fresh, parse+canonicalize+hash-bounded w/ progress) -> attach_warm (index-warm,
      # mtime/size-gated) -> edit (R-FILE-011(b), both write paths) -> bulk (R-FILE-011(c)).
      # Ordering is load-bearing: the fresh attach persists the reconcile index warm attach needs.
      - name: Run harness on the real subject (median-of-5, R-QA-009 discipline)
        run: >
          python3 bench/harness.py
          --subject "./src/build/dev/cli/context bench"
          --corpus bench/corpora/corpus-10k
          --runs 5 --scenarios attach,attach_warm,edit,bulk
          --out bench/results/ci-real-10k --label ci-real-10k

      - name: Extract the per-stage latency budget table (R-FILE-011 M1 exit criterion)
        run: >
          python3 bench/budget_table.py
          --result bench/results/ci-real-10k.json
          --out bench/results/budget-table-10k

      # Advisory numbers gate (same contract as the bench-baseline job's): archives the
      # measurement + reports drift once a baseline exists; never red-Xs the rollup here.
      - name: Perf gate (R-QA-009, advisory until the perf box is provisioned)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/ci-real-10k.json
          --scenario attach
          --baseline bench/baselines/attach-real-ci-ubuntu-10k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-attach-results
          path: bench/results/
          if-no-files-found: error

  # spikes/wasm smoke on ALL THREE platforms (L-8/R-LANG-003: per-platform WASM backends are
  # the point — wasmtime prebuilt C API + WAMR from source both support win/mac/linux).
  # Uses the stand-alone CONTEXT_BUILD_SPIKE_WASM toggle: no vcpkg toolchain, so the
  # vcpkg-dependent spikes stay unconfigured and the job stays lean. Honest per-platform
  # gating: the WAMR-AOT leg needs a wamrc prebuilt, which exists for x86_64 win/linux but NOT
  # for macos-arm64 — the spike's CMake gates it off there automatically (recorded in
  # spikes/wasm/FINDINGS.md).
  spike-wasm:
    name: spike-wasm (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (wasm spike only)
        run: >
          cmake -B build/spike-wasm -S src
          -DCMAKE_BUILD_TYPE=Release
          -DCONTEXT_BUILD_SPIKE_WASM=ON

      - name: Build
        run: cmake --build build/spike-wasm --config Release --target context-spike-wasm

      # ALL smoke legs are BLOCKING again (wasmtime + WAMR interpreter + WAMR AOT where wamrc
      # exists, plus the AOT target-pin regression guard). The WAMR AOT leg was quarantined
      # 2026-07-03→04 (tracker Context-Engine#24, intermittent SIGILL); ROOT CAUSE: wamrc's
      # default host-CPU codegen (LLVMGetHostCPUName() + empty explicit features ⇒ LLVM
      # model-default ISA) can overshoot what a hypervisor-masked VM in the CPU-heterogeneous
      # runner fleet actually executes, and WAMR's AOT loader never validates the ISA feature
      # level — the image loads and SIGILLs mid-run. FIXED by pinning the AOT codegen target to
      # the x86-64-v2 baseline in spikes/wasm/CMakeLists.txt; the
      # context-spike-wasm-aot-pin-guard ctest byte-verifies the pin so a drift fails
      # deterministically instead of flaking. On macos-arm64 the AOT tests are unregistered
      # (no wamrc prebuilt); the interpreter legs still run there.
      - name: Run smoke tests (wasmtime + wamr interp + wamr-aot — all blocking)
        run: ctest --test-dir build/spike-wasm -C Release -R context-spike-wasm --output-on-failure

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # WebGPU spike (spikes/webgpu): native build on all three desktop platforms + the offscreen
  # render/readback self-check. The spike is standalone-configurable (no vcpkg — it pins its own
  # wgpu-native prebuilt), so this job stays light: no other spike's deps are configured here.
  # The readback test RUNS wherever a software adapter exists (lavapipe on ubuntu, WARP on
  # windows, the paravirtual Metal device on macos) and SKIPs cleanly (exit 77) where none does.
  spike-webgpu:
    name: spike webgpu (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ (matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) && fromJSON('["self-hosted","Windows","X64","context-engine"]') || matrix.os }}
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSVC (self-hosted Windows — cmake 3.29 cannot drive the VS-18 generator; use Ninja + cl)
        if: runner.os == 'Windows' && runner.environment == 'self-hosted'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $out = cmd /c "`"$vs\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($name in 'PATH','INCLUDE','LIB','LIBPATH') {
            $line = ($out | Where-Object { $_ -like "$name=*" } | Select-Object -First 1)
            if ($line) { $line | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          }
          "CMAKE_GENERATOR=Ninja","CC=cl","CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # lavapipe (Mesa's software Vulkan rasterizer) gives the ubuntu leg a real adapter, so the
      # readback self-check actually renders on CI instead of skipping.
      - name: Install software Vulkan adapter (lavapipe)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      - name: Configure (standalone spike)
        run: cmake -S spikes/webgpu -B build/spike-webgpu -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/spike-webgpu --config Release

      - name: Run probe + offscreen render/readback self-check
        run: ctest --test-dir build/spike-webgpu -C Release --verbose

      # vcpkg binary cache for the integrated configure below (ubuntu only) — same shared
      # key as the bench-baseline job, which installs the same manifest.
      - name: vcpkg binary cache
        if: runner.os == 'Linux'
        uses: actions/cache@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-${{ runner.os }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-configuration.json') }}
          restore-keys: vcpkg-bin-${{ runner.os }}-

      # Wiring check (ubuntu only): the spike must also build through the integrated
      # CONTEXT_BUILD_SPIKES=ON path — the same `spikes` preset the bench job uses (vcpkg
      # toolchain, since the sibling spikes' deps come from the manifest's `spikes` feature;
      # V8 leg off — win-only).
      - name: Configure + build via the spikes preset (integration check)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          cmake -S src --preset spikes -DCONTEXT_SPIKE_JSENGINE_V8=OFF
          cmake --build src/build/spikes --target context-spike-webgpu

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # WebGPU spike, web leg: Emscripten + the emdawnwebgpu port binding the BROWSER's WebGPU (the
  # locked web path — NOT a Dawn cross-compile). Proves the same spike source compiles to
  # wasm+JS; the in-browser render run is a local/manual step (see spikes/webgpu/README.md).
  # Toolchain note: this leg compiles with emsdk's bundled LLVM — recorded as 'documented'
  # (unpinned, floats with emsdk 'latest') in cmake/toolchain-versions.json; pinning emsdk is a
  # staged follow-up that lands with the first non-spike web build target.
  spike-webgpu-web:
    name: spike webgpu (web, emscripten)
    needs: [license-gate, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install emsdk (latest)
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest

      - name: Configure + build (wasm)
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          emcmake cmake -S spikes/webgpu -B build/spike-webgpu-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build/spike-webgpu-web

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: spike-webgpu-web
          path: |
            build/spike-webgpu-web/context-spike-webgpu.html
            build/spike-webgpu-web/context-spike-webgpu.js
            build/spike-webgpu-web/context-spike-webgpu.wasm
          if-no-files-found: error

  # M4 render foundation (src/render/, issue #114): the PRODUCTION T1 native backend
  # (context_render_wgpu over the SHA-pinned wgpu-native prebuilt) + the offscreen pixel-readback
  # proof, driven through the rhi.h abstraction. Generalizes the spike-webgpu job to the promoted
  # subsystem.
  #
  # Policy (M4 visual-equivalence method, ROADMAP §1): Linux-Vulkan is the BLOCKING correctness gate;
  # other backends are advisory. lavapipe (Mesa's software Vulkan rasterizer) gives the ubuntu leg a
  # real adapter, so `render (ubuntu-latest)` runs the real offscreen render/readback and is the
  # authoritative gate. macOS is kept as an advisory desktop signal. Windows native render is
  # INTENTIONALLY NOT run in this job: it is already covered by the `build (windows-latest)` MSVC
  # compile+link leg and the `spike webgpu (windows-latest)` probe, and running the native wgpu-native
  # offscreen build + `ctest -R "^render-wgpu-"` on the Session-0 self-hosted Windows runner crashed
  # non-deterministically on native-GPU teardown (0xc0000409 / STATUS_STACK_BUFFER_OVERRUN) — the same
  # Session-0 carve-out documented in the M1 webgpu spike history (PR #97), where the fix was to NOT run
  # native render on Session-0 Windows. Dropping windows-latest from this matrix removes that crash
  # surface entirely with no loss of Windows coverage. So: build + probe (R-HEAD-002, adapter
  # enumeration, no device) on ubuntu (blocking) and macOS (advisory), with the offscreen render/
  # readback running wherever a software adapter exists (lavapipe on ubuntu; skips cleanly on macOS).
  # The library half (context_render: RHI + extract + double-buffer + detachable renderer) is exercised
  # by the main `build` job's ctest under CONTEXT_BUILD_RENDER_WGPU=OFF, so this job is only the native
  # dependency path.
  render:
    name: render (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      # lavapipe (Mesa's software Vulkan rasterizer) gives the ubuntu leg a real adapter, so the
      # offscreen readback self-check actually renders on CI instead of skipping.
      - name: Install software Vulkan adapter (lavapipe)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      # Configure the dev preset with the wgpu backend ON (it fetches + SHA-verifies the pinned
      # wgpu-native prebuilt). The context_render library half already builds in the main `build`
      # job with the toggle OFF; here we only build + test the native offscreen proof.
      - name: Configure (dev preset + wgpu render backend)
        run: cmake -S src --preset dev -DCONTEXT_BUILD_RENDER_WGPU=ON

      - name: Build offscreen proof
        run: cmake --build --preset dev --target context_render_wgpu_offscreen
        working-directory: src

      - name: Run probe + offscreen render/readback
        run: ctest --preset dev -R "^render-wgpu-" --output-on-failure
        working-directory: src

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

  # Native shader cross-compile TOOLCHAIN de-risk (src/render/shadercc/, issue #125, sub-task B of
  # #119): make glslang + SPIRV-Cross + SPIRV-Tools (the vcpkg `shader-crosscompile` manifest feature)
  # AVAILABLE + CI-proven to build/link behind the default-OFF CONTEXT_BUILD_SHADER_CROSSCOMPILE flag —
  # mirroring the render (CONTEXT_BUILD_RENDER_WGPU) dependency-path job. It does NOT wire cross-compile
  # logic into the engine (that is sub-task C, behind material/'s IShaderCompiler seam); it only builds
  # the toolchain + runs a glslang->SPIR-V smoke (validated by SPIRV-Tools, reflected by SPIRV-Cross).
  #
  # This is a CPU compile path — there is NO GPU / native-render leg here, so (unlike the render/build
  # jobs) it runs on the GH-hosted trio: vcpkg is preinstalled as $VCPKG_INSTALLATION_ROOT and the
  # toolchain builds from source under the vcpkg triplet compiler. Uniform `shell: bash` (Git Bash on
  # the Windows GH runner) keeps the 3-OS steps identical.
  #
  # Policy (standing M4 CI policy, issue #125): Linux is the BLOCKING build/link/smoke gate; macOS and
  # Windows are ADVISORY (continue-on-error) desktop-parity signals — a red advisory leg never blocks
  # the PR. Default-OFF means the main `build` matrix + the local dev gate never resolve this toolchain.
  shader-crosscompile:
    name: shader-crosscompile (${{ matrix.os }})
    needs: [license-gate, python-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
    steps:
      - uses: actions/checkout@v7

      # Persist the built glslang/spirv-cross/spirv-tools archives across runs so the from-source
      # vcpkg build only pays full cost on a manifest change (key = src/vcpkg.json hash).
      - name: vcpkg binary cache
        uses: actions/cache@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-bin-shadercc-${{ runner.os }}-${{ hashFiles('src/vcpkg.json') }}
          restore-keys: vcpkg-bin-shadercc-${{ runner.os }}-

      # The shader-crosscompile preset pulls the toolchain via the vcpkg manifest feature
      # (VCPKG_MANIFEST_FEATURES=shader-crosscompile) under the vcpkg toolchain ($VCPKG_ROOT) and sets
      # CONTEXT_BUILD_SHADER_CROSSCOMPILE=ON. GH-hosted runners preinstall vcpkg as
      # $VCPKG_INSTALLATION_ROOT (same as the bench-baseline job).
      - name: Configure (shader-crosscompile toolchain, vcpkg)
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          cmake -S src --preset shader-crosscompile

      - name: Build the toolchain + smoke
        run: cmake --build --preset shader-crosscompile
        working-directory: src

      - name: Run the glslang->SPIR-V smoke (SPIRV-Tools validate + SPIRV-Cross reflect)
        run: ctest --preset shader-crosscompile --output-on-failure
        working-directory: src
