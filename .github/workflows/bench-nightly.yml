# Context Engine nightly benchmark — the §6 NIGHTLY/TREND tier of the R-FILE-011 scale envelope
# (issue #38): the FULL 100k-file benchmark on the real attach pipeline, the dense-reference
# synthetic (R-FILE-011(e): edges O(refs) > O(files)), the session-query p99 budget
# (R-BRIDGE-008), the sustained-write backpressure / dirty-set-latency measurement (R-FILE-013),
# and the N-daemons-on-one-box scenario (R-FILE-011 composed budgets; the R-FILE-010
# multi-worktree scenario home — its shared-cache contention measurement activates at M2).
#
# Runner-class honesty (R-QA-009 / R-QA-012): ubuntu-latest is SHARED, not the perf-isolated
# `perf-linux-bare-metal` class docs/ci-fleet-manifest.json names for the 100k floor — so this
# whole workflow is ADVISORY/TREND: results are archived as artifacts + the perf-gate time series,
# drift stays visible, and nothing here red-Xs a merge. When the perf box is provisioned the
# manifest rows flip to blocking and this workflow moves onto that runner class.
#
# Registered in docs/ci-fleet-manifest.json (job id `bench-100k-nightly`), which the per-PR
# python-tests job validates against BOTH workflows (tools/check_fleet_manifest.py).

name: bench-nightly

on:
  schedule:
    - cron: "17 3 * * *" # nightly, off-peak UTC
  workflow_dispatch:

jobs:
  bench-100k-nightly:
    name: bench nightly (100k real pipeline, ubuntu, advisory trend)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the context CLI
        run: cmake --build --preset dev --target context
        working-directory: src

      - name: Generate seeded 100k corpus (R-FILE-011 envelope scale)
        run: python3 bench/gen_corpus.py --size 100000 --out bench/corpora/corpus-100k --jobs 4

      - name: Generate seeded 10k dense-reference corpus (R-FILE-011(e))
        run: >
          python3 bench/gen_corpus.py --size 10000 --variant dense
          --out bench/corpora/corpus-10k-dense --jobs 4

      # The full scenario sweep on the real subject at envelope scale. Ordering is load-bearing
      # (the fresh attach persists the reconcile index the warm attach + edit/bulk primes use).
      - name: Run harness — 100k real pipeline (median-of-5, R-QA-009 discipline)
        run: >
          python3 bench/harness.py
          --subject "./src/build/dev/cli/context bench"
          --corpus bench/corpora/corpus-100k
          --runs 5 --scenarios attach,attach_warm,edit,bulk,query,sustained,daemons
          --daemons 4 --daemon-corpus-size 1000
          --out bench/results/nightly-100k --label nightly-100k

      # Dense-reference synthetic: the edge-heavy case (many more ref edges than files) at proxy
      # size — the property under test is edges >> files, not absolute file count.
      - name: Run harness — dense-reference synthetic (R-FILE-011(e))
        run: >
          python3 bench/harness.py
          --subject "./src/build/dev/cli/context bench"
          --corpus bench/corpora/corpus-10k-dense
          --runs 5 --scenarios attach
          --out bench/results/nightly-10k-dense --label nightly-10k-dense

      - name: Extract the per-stage latency budget table (R-FILE-011 M1 exit criterion)
        run: >
          python3 bench/budget_table.py
          --result bench/results/nightly-100k.json
          --out bench/results/budget-table-100k

      # Advisory perf gates: archive the trend series per scenario; report drift once baselines
      # exist. Nothing gates on a shared runner (R-QA-009 rule 1).
      - name: Perf gate — warm attach (advisory)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/nightly-100k.json
          --scenario attach_warm
          --baseline bench/baselines/attach-warm-nightly-100k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: Perf gate — session-query p99 (advisory)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/nightly-100k.json
          --scenario query --metric p99_ms
          --baseline bench/baselines/query-p99-nightly-100k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: Perf gate — sustained dirty-set latency (advisory)
        continue-on-error: true
        run: >
          python3 bench/perf_gate.py
          --result bench/results/nightly-100k.json
          --scenario sustained --metric dirty_latency_max_ms
          --baseline bench/baselines/sustained-dirty-max-nightly-100k.json
          --archive bench/results/archive
          --runner-class gh-ubuntu-shared

      - name: sccache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload nightly bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-nightly-results
          path: bench/results/
          if-no-files-found: error

  # M8.5 a21 — R-FILE-011 orchestration-density FULL ladder (ticks/sec/instance +
  # instances-per-box; wedge pillar 1, ARCHITECTURE §1.1): N headless PACKED instances (the a06
  # context_runtime_server over a `context build` v1 pack) stepped/seeded/hashed in parallel from
  # ONE controller (bench/density.py) over the R-QA-005 session surface. Nightly runs the deep
  # ladder past the committed instances-per-box floor so drift stays visible before it breaches
  # (R-QA-009 rule 4); the per-PR proxy in ci.yml (`density-bench`) runs the short ladder. Same
  # runner-class honesty as the rest of this workflow: ADVISORY until the perf-isolated
  # `perf-linux-bare-metal` class is provisioned (ops1 deferred, owner ruling 2026-07-18; committed
  # floors + methodology in bench/density-targets.json + docs/density-targets.md).
  density-nightly:
    name: density nightly (packed instances, full ladder, ubuntu, advisory trend)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain (L-42 manifest)
        uses: ./.github/actions/pinned-toolchain

      - name: Build environment (sccache + CMake env)
        uses: ./.github/actions/setup-build-env

      - name: Configure (dev preset)
        run: cmake -S src --preset dev

      - name: Build the CLI + shipped server runtime host
        run: cmake --build --preset dev --target context context_runtime_server
        working-directory: src

      - name: Build a v1 pack for the density subject
        shell: bash
        run: |
          set -euo pipefail
          PROJ="$(mktemp -d)"
          mkdir -p "$PROJ/scenes"
          printf '%s' '{"$schema":"ctx:project","scene":"scenes/main.scene.json","version":1}' > "$PROJ/project.json"
          printf '%s' '{"$schema":"ctx:scene","version":1,"entities":[{"id":"aaaa0000aaaa0001","name":"Camera","components":{"camera":{"fov":1.0}}},{"id":"aaaa0000aaaa0002","name":"Player","components":{"transform":{}}}]}' > "$PROJ/scenes/main.scene.json"
          src/build/dev/cli/context build --target linux --flavor server --project "$PROJ" \
            --out "$PROJ/server.pack" --runtime "$PWD/src/build/dev/runtime/host/context-runtime-server"
          echo "DENSITY_PACK=$PROJ/server.pack" >> "$GITHUB_ENV"

      - name: Run the density controller — full ladder (median-of-5, R-QA-009 discipline)
        run: >
          python3 bench/density.py measure
          --server ./src/build/dev/runtime/host/context-runtime-server
          --pack "$DENSITY_PACK"
          --ticks 6000000 --ladder 1,2,4,8,16,32 --runs 5
          --label nightly-density --runner-class gh-ubuntu-shared
          --out bench/results/nightly-density

      - name: Density gate (R-FILE-011, advisory trend)
        continue-on-error: true
        run: >
          python3 bench/density.py gate
          --result bench/results/nightly-density.json
          --targets bench/density-targets.json
          --archive bench/results/archive
          --out bench/results/nightly-density-table

      - name: sccache stats
        shell: bash
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload nightly density results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: density-nightly-results
          path: bench/results/
          if-no-files-found: error
