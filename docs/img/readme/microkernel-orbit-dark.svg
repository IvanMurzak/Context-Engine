<svg width="955" height="200" viewBox="0 0 955 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A microkernel where every feature is a package">
  <style>
    .b-head { font:700 20px 'Segoe UI',Ubuntu,sans-serif; fill:#e6edf3; }
    .b-tag  { font:600 12.5px ui-monospace,'Cascadia Mono',Consolas,monospace; fill:#8b949e; }
    .b-chips{ font:600 10px ui-monospace,'Cascadia Mono',Consolas,monospace; fill:#8b949e; letter-spacing:1px; }
    .b-core { font:600 11px ui-monospace,'Cascadia Mono',Consolas,monospace; fill:#ffffff; }
    .b-leg  { font:600 9px ui-monospace,'Cascadia Mono',Consolas,monospace; fill:#8b949e; letter-spacing:1.5px; }
    .b-fade { opacity:0; animation:b-in .5s ease-out forwards; }
    .b-halo { animation:b-breathe 3.2s ease-in-out infinite alternate; }
    .b-dot  { animation:b-pulse 2.6s ease-in-out infinite alternate; }
    @keyframes b-in      { to { opacity:1; } }
    @keyframes b-breathe { from { opacity:.25; } to { opacity:.65; } }
    @keyframes b-pulse   { from { opacity:.45; } to { opacity:1; } }
    @media (prefers-reduced-motion: reduce){
      .b-fade { animation:none; opacity:1; }
      .b-halo,.b-dot { animation:none; }
    }
  </style>
  <defs>
    <radialGradient id="b-coreg" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#a371f7"/><stop offset="1" stop-color="#6e40c9"/>
    </radialGradient>
    <radialGradient id="b-halog" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.8"/><stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <text class="b-head b-fade" x="40" y="70">every feature is a package</text>
  <text class="b-tag b-fade" x="41" y="96" style="animation-delay:.25s">render · physics · audio · input — all hot-reload packages</text>
  <g class="b-fade" style="animation-delay:.6s">
    <circle cx="46" cy="128" r="3" fill="#a371f7" class="b-dot"/>
    <circle cx="180" cy="128" r="3" fill="#a371f7" class="b-dot" style="animation-delay:.8s"/>
    <circle cx="356" cy="128" r="3" fill="#a371f7" class="b-dot" style="animation-delay:1.6s"/>
    <text class="b-chips" x="56" y="132">MINIMAL KERNEL</text>
    <text class="b-chips" x="190" y="132">HOT-RELOAD PACKAGES</text>
    <text class="b-chips" x="366" y="132">ONE RPC SURFACE</text>
  </g>

  <circle class="b-halo" cx="750" cy="97" r="44" fill="url(#b-halog)"/>
  <circle cx="750" cy="97" r="52" stroke="#a371f7" stroke-opacity="0.35" stroke-dasharray="3 5">
    <animateTransform attributeName="transform" type="rotate" from="0 750 97" to="360 750 97" dur="30s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="97" r="80" stroke="#2f81f7" stroke-opacity="0.25" stroke-dasharray="2 6">
    <animateTransform attributeName="transform" type="rotate" from="360 750 97" to="0 750 97" dur="44s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="97" r="24" stroke="#a371f7" opacity="0.5">
    <animate attributeName="r" values="24;66" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="97" r="24" stroke="#a371f7" opacity="0.5">
    <animate attributeName="r" values="24;66" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="97" r="24" fill="url(#b-coreg)"/>
  <text class="b-core" x="750" y="101" text-anchor="middle">kernel</text>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 750 97" to="360 750 97" dur="22s" repeatCount="indefinite"/>
    <circle cx="802" cy="97" r="5" fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/><circle cx="802" cy="97" r="2" fill="#a371f7"/>
    <circle cx="724" cy="52" r="5" fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/><circle cx="724" cy="52" r="2" fill="#a371f7"/>
    <circle cx="724" cy="142" r="5" fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/><circle cx="724" cy="142" r="2" fill="#a371f7"/>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 750 97" to="0 750 97" dur="34s" repeatCount="indefinite"/>
    <circle cx="806" cy="40" r="5" fill="#0d1117" stroke="#79c0ff" stroke-width="1.5"/><circle cx="806" cy="40" r="2" fill="#79c0ff"/>
    <circle cx="806" cy="154" r="5" fill="#0d1117" stroke="#79c0ff" stroke-width="1.5"/><circle cx="806" cy="154" r="2" fill="#79c0ff"/>
    <circle cx="694" cy="40" r="5" fill="#0d1117" stroke="#79c0ff" stroke-width="1.5"/><circle cx="694" cy="40" r="2" fill="#79c0ff"/>
    <circle cx="694" cy="154" r="5" fill="#0d1117" stroke="#79c0ff" stroke-width="1.5"/><circle cx="694" cy="154" r="2" fill="#79c0ff"/>
  </g>
  <text class="b-leg b-fade" x="750" y="192" text-anchor="middle" style="animation-delay:.9s">render · physics · audio · input · ui · net</text>
</svg>
