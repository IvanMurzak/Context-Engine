<svg width="955" height="186" viewBox="0 0 955 186" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Headless terminal: context build, deterministic state-hash, zero GPU, zero GUI">
  <style>
    .al-ln   { font:500 13px ui-monospace,'Cascadia Mono',Consolas,monospace; fill:#24292f; }
    .al-dim  { fill:#6e7781; }
    .al-tw   { transform-box:fill-box; transform-origin:left; transform:scaleX(0); }
    .al-t1   { animation:al-type 1.3s steps(26,end) .3s forwards; }
    .al-t4   { animation:al-type 1.1s steps(22,end) 3s forwards; }
    .al-o2   { opacity:0; animation:al-in .4s ease-out 1.8s forwards; }
    .al-o3   { opacity:0; animation:al-in .4s ease-out 2.4s forwards; }
    .al-o5   { opacity:0; animation:al-in .2s ease-out 4.3s forwards; }
    .al-cur  { animation:al-blink 1.1s steps(1) infinite; }
    @keyframes al-in    { to { opacity:1; } }
    @keyframes al-type  { to { transform:scaleX(1); } }
    @keyframes al-blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @media (prefers-reduced-motion: reduce){
      .al-o2,.al-o3,.al-o5 { animation:none; opacity:1; }
      .al-tw { animation:none; transform:scaleX(1); }
      .al-cur { animation:none; }
    }
  </style>
  <defs>
    <clipPath id="al-c1"><rect class="al-tw al-t1" x="30" y="52" width="212" height="18"/></clipPath>
    <clipPath id="al-c4"><rect class="al-tw al-t4" x="30" y="124" width="180" height="18"/></clipPath>
  </defs>
  <rect x="1.5" y="8" width="952" height="170" rx="10" fill="#fbfcfd" stroke="#d0d7de"/>
  <circle cx="26" cy="28" r="4.5" fill="#f85149"/><circle cx="42" cy="28" r="4.5" fill="#d29922"/><circle cx="58" cy="28" r="4.5" fill="#3fb950"/>
  <text class="al-ln al-dim" x="930" y="32" text-anchor="end" font-size="10">no GPU · no GUI · any cheap machine</text>
  <text class="al-ln" x="30" y="66" clip-path="url(#al-c1)"><tspan fill="#1a7f37">$</tspan> context build --headless</text>
  <text class="al-ln al-dim al-o2" x="30" y="90"><tspan fill="#1a7f37">✔</tspan> 14 packages · kernel · 0 GPU · 0 GUI</text>
  <text class="al-ln al-dim al-o3" x="30" y="114"><tspan fill="#1a7f37">✔</tspan> state-hash 9f3ac2e1 == 9f3ac2e1 <tspan fill="#1a7f37">deterministic</tspan></text>
  <text class="al-ln" x="30" y="138" clip-path="url(#al-c4)"><tspan fill="#1a7f37">$</tspan> context run --verify</text>
  <g class="al-o5">
    <text class="al-ln" x="30" y="162"><tspan fill="#1a7f37">$</tspan></text>
    <rect class="al-cur" x="46" y="150" width="8" height="14" fill="#0969da"/>
  </g>
</svg>
